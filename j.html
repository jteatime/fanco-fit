const parseSets = (s) =>
  s && s.trim()
    ? s.trim().split(/\s+/).map((t) => {
        const [w, r] = t.split("x");
        return { w: parseFloat(w), r: parseInt(r, 10) || 0 };
      })
    : [];

const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, "-");

function buildSeed() {
  const data = {
    version: 1,
    unit: "kg",
    userName: "",
    nameAsked: false,
    cycleNumber: 2,
    cycleName: "Cycle 2",
    cycleWeeks: 8,
    cycleStart: "2026-06-15",
    exercises: [],
    sessions: {},
  };
  for (const day of DAYS) {
    RAW[day].ex.forEach(([name, prev, weeks, setsOverride, repGoal], i) => {
      const id = slug(`${day}-${i}-${name}`);
      const targetSets = setsOverride || Math.max(1, ...weeks.map((w) => parseSets(w).length));
      data.exercises.push({
        id,
        day,
        name,
        prev,
        targetSets,
        repGoal: repGoal || null,
        variants: [{ id: "main", name: "Usual machine" }],
        activeVariant: "main",
      });
      weeks.forEach((str, wi) => {
        const sets = parseSets(str);
        const date = RAW[day].dates[wi];
        if (!sets.length || !date) return;
        const key = `${date}|${day}`;
        if (!data.sessions[key]) data.sessions[key] = { date, day, entries: {} };
        data.sessions[key].entries[id] = { variantId: "main", sets, note: "", swapName: "" };
      });
    });
  }
  return data;
}

/* Helpers                                                             */
/* ------------------------------------------------------------------ */
const todayISO = () => {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
};
const fmtDate = (iso) =>
  new Date(iso + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const num = (v) => {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
};
const volumeOf = (sets) => sets.reduce((a, s) => a + (s.skipped ? 0 : num(s.w) * num(s.r)), 0);
const repsOf = (sets) => sets.reduce((a, s) => a + (s.skipped ? 0 : num(s.r)), 0);
const fmtVol = (n) => Math.round(n).toLocaleString("en-US");
const setsLine = (sets) =>
  sets
    .filter((s) => !s.skipped && (num(s.r) > 0 || num(s.w) > 0))
    .map((s) => `${s.w}×${s.r}${s.tag ? ` (${s.tag})` : ""}`)
    .join("  ");
const entryHasData = (e) => e && e.sets && e.sets.some((s) => !s.skipped && (num(s.r) > 0 || num(s.w) > 0));

function defaultDay() {
  const jd = new Date().getDay();
  if (Object.values(DAY_NUM).includes(jd)) {
    return DAYS.find((d) => DAY_NUM[d] === jd);
  }
  let best = DAYS[0], bestGap = 8;
  for (const d of DAYS) {
    const gap = (DAY_NUM[d] - jd + 7) % 7;
    if (gap < bestGap) { bestGap = gap; best = d; }
  }
  return best;
}

const sortedSessions = (data) =>
  Object.entries(data.sessions)
    .map(([key, s]) => ({ key, ...s }))
    .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));

const addDays = (iso, n) => {
  const d = new Date(iso + "T12:00:00");
  d.setDate(d.getDate() + n);
  const p = (x) => String(x).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
};
const weekOfCycle = (data, iso) =>
  Math.floor((new Date(iso + "T12:00:00") - new Date(data.cycleStart + "T12:00:00")) / (7 * 864e5));
function cellDateFor(cycleStart, w, day) {
  for (let i = 0; i < 7; i++) {
    const iso = addDays(cycleStart, w * 7 + i);
    if (new Date(iso + "T12:00:00").getDay() === DAY_NUM[day]) return iso;
  }
  return cycleStart;
}
const dayVolume = (sess) =>
  Object.values(sess.entries).reduce((a, e) => a + (entryHasData(e) ? volumeOf(e.sets) : 0), 0);
function daySessionIn(data, day, w) {
  return sortedSessions(data).find(
    (s) => s.day === day && weekOfCycle(data, s.date) === w && Object.values(s.entries).some(entryHasData)
  );
}

/* Most recent session containing this exercise (optionally same variant), excluding a key */
function lastEntryFor(data, exId, variantId, excludeKey, beforeDate) {
  const list = sortedSessions(data);
  for (let i = list.length - 1; i >= 0; i--) {
    const s = list[i];
    if (s.key === excludeKey) continue;
    if (beforeDate && s.date >= beforeDate) continue;
    const e = s.entries[exId];
    if (!entryHasData(e)) continue;
    if (variantId && e.variantId !== variantId) continue;
    return { date: s.date, entry: e };
  }
  return null;
}

/* All sessions for an exercise, ascending */
function historyFor(data, exId) {
  return sortedSessions(data)
    .filter((s) => entryHasData(s.entries[exId]))
    .map((s) => ({ key: s.key, date: s.date, entry: s.entries[exId] }));
}

function pct(from, to) {
  if (!from) return null;
  return ((to - from) / from) * 100;
}

/* ------------------------------------------------------------------ */
/* Sheet export — mirrors the original Google Sheet layout             */
/* ------------------------------------------------------------------ */
function buildSheetRows(data) {
  const start = new Date(data.cycleStart + "T12:00:00");
  const weekOf = (iso) => Math.floor((new Date(iso + "T12:00:00") - start) / (7 * 864e5));
  const sessions = sortedSessions(data);
  let maxWeek = 0;
  sessions.forEach((s) => {
    const w = weekOf(s.date);
    if (w >= 0 && w > maxWeek) maxWeek = w;
  });
  const weeks = maxWeek + 1;
  const SETS = 6;

  const rows = [];
  const h1 = ["", "Prev"];
  const h2 = ["", ""];
  for (let w = 0; w < weeks; w++) {
    for (let i = 0; i < SETS; i++) {
      h1.push(i === 0 ? `Week ${w + 1}` : "");
      h2.push(String(i + 1));
    }
  }
  rows.push(h1, h2);

  const extras = [];
  for (const day of DAYS) {
    rows.push([day]);
    for (const ex of data.exercises.filter((e) => e.day === day)) {
      const r = [ex.name, ex.prev ?? ""];
      for (let w = 0; w < weeks; w++) {
        const sess = sessions.find(
          (s) => s.day === day && weekOf(s.date) === w && entryHasData(s.entries[ex.id])
        );
        const cells = Array(SETS).fill("");
        if (sess) {
          const e = sess.entries[ex.id];
          const logged = e.sets.filter((x) => num(x.r) > 0 || num(x.w) > 0);
          logged.forEach((x, i) => {
            const cell = `${x.w}x${x.r}${x.tag ? ` (${x.tag})` : ""}`;
            if (i < SETS) cells[i] = cell;
            else cells[SETS - 1] += ` + ${cell}`;
          });
          const vName = (ex.variants.find((v) => v.id === e.variantId) || {}).name || "";
          if ((e.note && e.note.trim()) || (vName && vName !== "Usual machine") || e.swapName) {
            extras.push([
              sess.date, day, ex.name,
              e.swapName ? `did ${e.swapName}` : "",
              vName !== "Usual machine" ? vName : "",
              e.note || "",
            ]);
          }
        }
        r.push(...cells);
      }
      rows.push(r);
    }
  }

  if (extras.length) {
    rows.push([], ["Machines, swaps & notes"], ["Date", "Day", "Exercise", "Swap", "Machine", "Note"]);
    extras.forEach((n) => rows.push(n));
  }
  return rows;
}

const toCSV = (rows) =>
  rows.map((r) => r.map((v) => {
    const s = String(v ?? "");
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }).join(",")).join("\n");

const toTSV = (rows) =>
  rows.map((r) => r.map((v) => String(v ?? "").replace(/[\t\n]/g, " ")).join("\t")).join("\n");

const Row = ({ children, style }) => (

const Delta = ({ value, suffix = "%" }) => {
  if (value === null || value === undefined || !isFinite(value))

  const up = value >= 0;
  return (
    <span className="ll-num" style={{ color: up ? T.pos : T.neg, fontSize: 13, fontWeight: 700 }}>
      {up ? "▲" : "▼"} {Math.abs(value).toFixed(1)}{suffix}

};

/* This week's status for a given training day */
function dayWeekStatus(data, d, wArg) {
  const today = todayISO();
  const w = wArg !== undefined ? wArg : Math.max(0, weekOfCycle(data, today));
  const sess = daySessionIn(data, d, w);
  if (sess) {
    let prev = null;
    for (let i = w - 1; i >= 0; i--) { const p = daySessionIn(data, d, i); if (p) { prev = p; break; } }
    const dv = dayVolume(sess);
    const pv = prev ? dayVolume(prev) : null;
    return pv !== null && dv > pv ? "star" : pv !== null && dv < pv ? "down" : "logged";
  }
  const dateIso = cellDateFor(data.cycleStart, w, d);
  if (dateIso === today) return "today";
  if (dateIso < today) return OPTIONAL_DAYS[d] ? "optional" : "missed";
  return "future";
}

function DayStatusIcon({ status, size = 8 }) {
  if (status === "star") return <span className="ll-star" style={{ fontSize: size + 5, lineHeight: 1, flex: "none" }}>★</span>;
  if (status === "missed") return <span style={{ color: T.faint, fontSize: size + 2, lineHeight: 1, flex: "none" }}>✕</span>;
  const st = { width: size, height: size, borderRadius: size, flex: "none", display: "inline-block" };
  if (status === "down") return <span style={{ ...st, background: T.neg }} />;
  if (status === "logged") return <span style={{ ...st, background: T.pos }} />;
  if (status === "today") return <span style={{ ...st, border: `2px solid ${T.blue}` }} />;
  if (status === "optional") return <span style={{ ...st, border: `1.5px dashed ${T.faint}`, opacity: 0.8 }} />;
  return <span style={{ ...st, border: `1.5px solid ${T.line}`, opacity: 0.6 }} />;
}

/* ------------------------------------------------------------------ */
/* Set editor row                                                      */
/* ------------------------------------------------------------------ */
const SET_TAGS = ["drop set", "partials", "rest-pause", "burnout"];

function SetRow({ idx, set, compareSet, unit, repGoal, onChange, onRemove }) {
  const w = num(set.w), r = num(set.r);
  let repsCls = "";
  let target = null;
  if (compareSet) {
    const lw = num(compareSet.w), lr = num(compareSet.r);
    const lastScore = lw > 0 ? lw * lr : lr;
    /* reps needed at today's weight to beat last week's set */
    if (w > 0) target = Math.floor((lw * lr) / w) + 1;
    else if (lw === 0) target = lr + 1;
    if (r > 0) {
      const todayScore = lw === 0 && w === 0 ? r : w * r;
      repsCls = todayScore > lastScore ? "good" : todayScore < lastScore ? "bad" : "";
    }
  }
  const dim = set.skipped ? { opacity: 0.4, pointerEvents: "none" } : {};
  return (
    <div style={{ marginBottom: set.extra ? 4 : 8 }}>
      <Row>
        <span className="ll-num" style={{ color: set.skipped ? T.faint : set.extra ? T.amber : T.faint, width: 18, fontSize: 13, flex: "none" }}>
          {set.skipped ? "–" : set.extra ? "+" : idx + 1}
        </span>
        <input className="ll-input ll-setnum" style={{ width: 78, ...dim }} inputMode="decimal" value={set.w} aria-label="weight" placeholder={unit || "kg"} disabled={!!set.skipped}
          onChange={(e) => onChange({ ...set, w: e.target.value })} />
        <span style={{ color: T.faint, fontSize: 13 }}>×</span>
        <button className="ll-step" style={dim} disabled={!!set.skipped} aria-label="minus 1 rep" onClick={() => onChange({ ...set, r: Math.max(0, num(set.r) - 1) })}>−</button>
        <input className={`ll-input ll-setnum ll-reps ${repsCls}`} style={dim} inputMode="numeric" value={set.r} aria-label="reps" disabled={!!set.skipped}
          placeholder={target ? `${target}+` : repGoal ? String(repGoal) : "reps"}
          onChange={(e) => onChange({ ...set, r: e.target.value })} />
        <button className="ll-step" style={dim} disabled={!!set.skipped} aria-label="plus 1 rep" onClick={() => onChange({ ...set, r: num(set.r) + 1 })}>+</button>
        <button onClick={() => onChange({ ...set, w: "", r: "", tag: "", skipped: false, skipNote: "" })} aria-label="clear set" title="clear set"
          style={{ background: "none", border: "none", color: T.muted, fontSize: 16, cursor: "pointer", padding: "0 3px" }}>⌫</button>
        {set.extra ? (
          <button onClick={onRemove} aria-label="remove set" title="delete set"
            style={{ background: "none", border: "none", color: T.faint, fontSize: 17, cursor: "pointer", padding: "0 2px" }}>✕</button>
        ) : (
          <button onClick={() => onChange({ ...set, skipped: !set.skipped })} aria-label={set.skipped ? "unskip set" : "skip set"}
            style={{ background: "none", border: "none", color: set.skipped ? T.amber : T.faint, fontSize: 11.5, cursor: "pointer", padding: "0 2px", fontFamily: "inherit", fontWeight: 600 }}>
            {set.skipped ? "undo" : "skip"}
          </button>
        )}
      </Row>
      {!set.extra && set.skipped && (
        <input className="ll-input" style={{ margin: "5px 0 8px 26px", width: "calc(100% - 26px)", fontSize: 13 }}
          placeholder="Why skip? (machine taken, out of gas…)" value={set.skipNote || ""}
          onChange={(e) => onChange({ ...set, skipNote: e.target.value })} />
      )}
      {set.extra && (
        <Row style={{ gap: 5, margin: "5px 0 8px 26px", flexWrap: "wrap" }}>
          {SET_TAGS.map((t) => (
            <button key={t} className={`ll-tagchip ${set.tag === t ? "on" : ""}`}
              onClick={() => onChange({ ...set, tag: set.tag === t ? "" : t })}>
              {t}
            </button>
          ))}
        </Row>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Exercise card (Today view)                                          */
/* ------------------------------------------------------------------ */
function ExerciseCard({ data, update, ex, sessionKey, dayColor }) {
  const [open, setOpen] = useState(false);
  const [addingMachine, setAddingMachine] = useState(false);
  const [machineName, setMachineName] = useState("");
  const [swapping, setSwapping] = useState(false);
  const [swapText, setSwapText] = useState("");

  const session = data.sessions[sessionKey];
  const sessionDate = sessionKey.split("|")[0];
  const entry = session && session.entries[ex.id];
  const variantId = entry ? entry.variantId : ex.activeVariant;
  const variant = ex.variants.find((v) => v.id === variantId) || ex.variants[0];

  const lastSame = lastEntryFor(data, ex.id, variantId, sessionKey, sessionDate);
  const lastAny = lastEntryFor(data, ex.id, null, sessionKey, sessionDate);

  const ensureEntry = (d) => {
    if (!d.sessions[sessionKey]) {
      d.sessions[sessionKey] = { date: sessionKey.split("|")[0], day: ex.day, entries: {} };
    }
    if (!d.sessions[sessionKey].entries[ex.id]) {
      d.sessions[sessionKey].entries[ex.id] = {
        variantId: ex.activeVariant,
        sets: Array.from({ length: ex.targetSets || 3 }, () => ({ w: "", r: "", extra: false, tag: "" })),
        note: "",
        swapName: "",
      };
    }
    return d.sessions[sessionKey].entries[ex.id];
  };

  /* Baked-in sets: opening the card lays out (and heals) the planned set count */
  useEffect(() => {
    if (!open) return;
    update((d) => {
      const e = ensureEntry(d);
      const nonExtra = e.sets.filter((s) => !s.extra);
      const extras = e.sets.filter((s) => s.extra);
      while (nonExtra.length < (ex.targetSets || 3)) nonExtra.push({ w: "", r: "", extra: false, tag: "" });
      e.sets = [...nonExtra, ...extras];
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [open]);

  const changeSet = (i, ns) =>
    update((d) => {
      const e = ensureEntry(d);
      const oldW = String(e.sets[i].w ?? "");
      e.sets[i] = ns;
      /* Cascade weight down to blank/matching sets — but never cascade a clear */
      const newW = String(ns.w ?? "");
      if (newW !== oldW && newW !== "") {
        for (let j = i + 1; j < e.sets.length; j++) {
          const wj = String(e.sets[j].w ?? "");
          if (wj === "" || wj === oldW) e.sets[j] = { ...e.sets[j], w: ns.w };
        }
      }
    });

  const addExtraSet = () =>
    update((d) => {
      const e = ensureEntry(d);
      const lastWeighted = [...e.sets].reverse().find((s) => num(s.w) > 0);
      e.sets.push({ w: lastWeighted ? lastWeighted.w : "", r: "", extra: true, tag: "" });
    });

  const copyLast = () =>
    update((d) => {
      const e = ensureEntry(d);
      if (lastSame) e.sets = lastSame.entry.sets.map((s) => ({ extra: false, tag: "", ...s }));
    });

  const todaySets = entry ? entry.sets : [];
  const hasLogged = todaySets.some((s) => !s.skipped && (num(s.r) > 0 || num(s.w) > 0));
  const plannedToday = todaySets.filter((s) => !s.extra);
  const exTotal = Math.max(plannedToday.length, ex.targetSets || 3);
  const plannedFilled = plannedToday.filter((s) => num(s.r) > 0 || s.skipped).length;
  const extraFilled = todaySets.filter((s) => s.extra && num(s.r) > 0).length;
  const exFilled = plannedFilled + extraFilled;
  const exComplete = plannedFilled >= exTotal;
  const todayVol = volumeOf(todaySets);
  const lastVol = lastSame ? volumeOf(lastSame.entry.sets) : 0;
  const liveDelta = hasLogged && lastSame ? pct(lastVol, todayVol) : null;
  const beating = exComplete && liveDelta !== null && liveDelta > 0;
  const stripColor = !exComplete
    ? T.line
    : beating ? T.pos : liveDelta !== null && liveDelta < 0 ? T.neg : T.amber;

  const bodyweight = lastSame && volumeOf(lastSame.entry.sets) === 0 && repsOf(lastSame.entry.sets) > 0;

  return (
    <div className="ll-card">
      {/* header */}
      <div onClick={() => setOpen(!open)} style={{ padding: "13px 14px", cursor: "pointer" }}>
        <Row style={{ justifyContent: "space-between" }}>
          <Row style={{ gap: 9, minWidth: 0 }}>
            <span style={{ width: 4, alignSelf: "stretch", minHeight: 20, borderRadius: 2, background: stripColor, flex: "none", boxShadow: beating ? "0 0 8px rgba(105,181,109,0.7)" : "none" }} />
            <div style={{ minWidth: 0 }}>
              <div className="ll-display" style={{ fontSize: 18, fontWeight: 600 }}>
                {entry && entry.swapName ? entry.swapName : ex.name}
                {entry && entry.swapName ? (
                  <span style={{ color: T.amber, fontSize: 12, marginLeft: 8, fontFamily: "Barlow" }}>swapped</span>
                ) : null}
              </div>
              <div style={{ color: T.muted, fontSize: 12.5, marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {ex.variants.length > 1 ? `${variant.name} · ` : ""}
                {lastSame ? `last ${fmtDate(lastSame.date)}: ${setsLine(lastSame.entry.sets)}` : "no history on this machine"}
              </div>
            </div>
          </Row>
          <Row style={{ gap: 8, flex: "none" }}>
            {exTotal > 0 && (
              <span className="ll-num" style={{ color: exComplete ? T.pos : T.faint, fontSize: 12, fontWeight: 700 }}>
                {exFilled}/{exTotal}{exComplete ? " ✓" : ""}
              </span>
            )}
            {lastSame && lastSame.entry.note && <span title="note last time" style={{ color: T.amber, fontSize: 14 }}>●</span>}
            <span style={{ color: T.faint, fontSize: 13 }}>{open ? "▾" : "▸"}</span>
          </Row>
        </Row>
      </div>

      {open && (
        <div className="ll-fade" style={{ padding: "0 14px 14px", borderTop: `1px solid ${T.line}` }}>
          {/* last time */}
          <div style={{ background: T.bg, border: `1px solid ${T.line}`, borderRadius: 10, padding: "10px 12px", margin: "12px 0 10px" }}>
            {lastSame ? (
              <>
                <Row style={{ justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ color: T.muted, fontSize: 12.5, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                    Last time · {fmtDate(lastSame.date)}
                  </span>
                  <span className="ll-num" style={{ color: T.muted, fontSize: 12.5 }}>
                    {bodyweight ? `${repsOf(lastSame.entry.sets)} reps` : `vol ${fmtVol(lastVol)}`}
                  </span>
                </Row>
                <div className="ll-num" style={{ fontSize: 15.5, lineHeight: 1.5 }}>{setsLine(lastSame.entry.sets)}</div>
                {lastSame.entry.sets.some((s) => s.skipped && s.skipNote) && (
                  <div style={{ color: T.faint, fontSize: 12, marginTop: 4 }}>
                    {lastSame.entry.sets
                      .map((s, i) => (s.skipped && s.skipNote ? `set ${i + 1} skipped: ${s.skipNote}` : null))
                      .filter(Boolean)
                      .join(" · ")}
                  </div>
                )}
                {lastSame.entry.note ? <div className="ll-note" style={{ marginTop: 8 }}>“{lastSame.entry.note}”</div> : null}
              </>
            ) : (
              <>
                <div style={{ color: T.muted, fontSize: 13.5 }}>First time on <b style={{ color: T.ink }}>{variant.name}</b>.</div>
                {lastAny && (
                  <div style={{ color: T.faint, fontSize: 12.5, marginTop: 4 }}>
                    Other machine, {fmtDate(lastAny.date)}: <span className="ll-num">{setsLine(lastAny.entry.sets)}</span>
                  </div>
                )}
              </>
            )}
          </div>

          {/* machine selector */}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
            {ex.variants.map((v, i) => (
              <button key={v.id} className={`ll-chip ${v.id === variantId ? "on" : ""}`}
                onClick={() =>
                  update((d) => {
                    const dex = d.exercises.find((x) => x.id === ex.id);
                    dex.activeVariant = v.id;
                    const s = d.sessions[sessionKey];
                    if (s && s.entries[ex.id]) s.entries[ex.id].variantId = v.id;
                  })
                }>
                <VariantDot index={i} /> {v.name}
              </button>
            ))}
            {addingMachine ? (
              <Row style={{ width: "100%" }}>
                <input className="ll-input" autoFocus placeholder="Machine name (e.g. plate-loaded)" value={machineName}
                  onChange={(e) => setMachineName(e.target.value)} />
                <button className="ll-btn ll-btn-sm ll-btn-chalk" onClick={() => {
                  const name = machineName.trim();
                  if (!name) return;
                  update((d) => {
                    const dex = d.exercises.find((x) => x.id === ex.id);
                    const vid = slug(name) + "-" + dex.variants.length;
                    dex.variants.push({ id: vid, name });
                    dex.activeVariant = vid;
                    const s = d.sessions[sessionKey];
                    if (s && s.entries[ex.id]) s.entries[ex.id].variantId = vid;
                  });
                  setMachineName(""); setAddingMachine(false);
                }}>Add</button>
              </Row>
            ) : (
              <button className="ll-chip" onClick={() => setAddingMachine(true)}>+ machine</button>
            )}
          </div>

          {/* today's sets */}
          {todaySets.length > 0 && (
            <Row style={{ justifyContent: "center", gap: 6, margin: "2px 0 8px", fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: T.faint }}>
              <span>weight ({data.unit || "kg"})</span><span>×</span><span style={{ color: T.amber }}>reps</span>
            </Row>
          )}
          {(() => {
            const lastLogged = lastSame
              ? lastSame.entry.sets.filter((x) => num(x.r) > 0 || num(x.w) > 0)
              : [];
            return todaySets.map((s, i) => (
              <SetRow key={i} idx={i} set={s} unit={data.unit} repGoal={ex.repGoal}
                compareSet={!s.extra ? lastLogged[i] : undefined}
                onChange={(ns) => changeSet(i, ns)}
                onRemove={() => update((d) => { ensureEntry(d).sets.splice(i, 1); })} />
            ));
          })()}

          <Row style={{ marginTop: 4, marginBottom: 10 }}>
            {lastSame && !hasLogged && (
              <button className="ll-btn ll-btn-chalk" style={{ flex: 1 }} onClick={copyLast}>Copy last time</button>
            )}
            <button className="ll-btn" style={{ flex: 1 }} onClick={addExtraSet}>+ Extra set</button>
          </Row>

          {hasLogged && (
            <Row style={{ justifyContent: "space-between", marginBottom: 10 }}>
              <span style={{ color: T.muted, fontSize: 13 }}>
                Today: <span className="ll-num" style={{ color: T.ink }}>{fmtVol(todayVol)}</span> vol
              </span>
              <Delta value={liveDelta} />
            </Row>
          )}

          {/* note */}
          <textarea className="ll-input" placeholder="Note for today (seat position, pain, tempo…)"
            value={entry ? entry.note : ""} rows={1}
            onChange={(e) => update((d) => { ensureEntry(d).note = e.target.value; })} />

          {/* swap exercise */}
          <div style={{ marginTop: 10 }}>
            {swapping ? (
              <Row>
                <input className="ll-input" autoFocus placeholder="What are you doing instead?" value={swapText}
                  onChange={(e) => setSwapText(e.target.value)} />
                <button className="ll-btn ll-btn-sm ll-btn-chalk" onClick={() => {
                  update((d) => { ensureEntry(d).swapName = swapText.trim(); });
                  setSwapping(false);
                }}>Set</button>
              </Row>
            ) : entry && entry.swapName ? (
              <button className="ll-btn ll-btn-sm" onClick={() => update((d) => { ensureEntry(d).swapName = ""; })}>
                Undo swap (back to {ex.name})
              </button>
            ) : (
              <button style={{ background: "none", border: "none", color: T.faint, fontSize: 13, cursor: "pointer", padding: 0, fontFamily: "inherit" }}
                onClick={() => { setSwapText(""); setSwapping(true); }}>
                ⇄ Swap exercise for today
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* Today view                                                          */
/* ------------------------------------------------------------------ */
function TodayView({ data, update, day, setDay }) {
  const [weekOffset, setWeekOffset] = useState(0);
  const curWeek = Math.max(0, weekOfCycle(data, todayISO()));
  const maxWeek = Math.max((data.cycleWeeks || 8) - 1, curWeek);
  const wIdx = Math.min(maxWeek, Math.max(0, curWeek + weekOffset));
  const existing = daySessionIn(data, day, wIdx);
  const dateFor = existing ? existing.date : cellDateFor(data.cycleStart, wIdx, day);
  const sessionKey = existing ? existing.key : `${dateFor}|${day}`;
  const exList = data.exercises.filter((e) => e.day === day);
  const isToday = dateFor === todayISO();

  const sess = data.sessions[sessionKey];
  const [celebration, setCelebration] = useState(null);

  /* Completion: every planned set of every exercise is filled or skipped —
     an exercise with a missing entry or missing rows counts its full target */
  let totalSets = 0, filledSets = 0;
  exList.forEach((ex) => {
    const e = sess && sess.entries[ex.id];
    const planned = e ? e.sets.filter((s) => !s.extra) : [];
    totalSets += Math.max(planned.length, ex.targetSets || 3);
    filledSets += planned.filter((s) => num(s.r) > 0 || s.skipped).length;
  });
  const complete = exList.length > 0 && totalSets > 0 && filledSets >= totalSets;

  const fireCelebration = () => {
    const who = (data.userName || "champ").trim();
    const msg = CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)].replace(/\{name\}/g, who);
    setCelebration({ msg, refeed: day === "Friday" });
    update((d) => { if (d.sessions[sessionKey]) d.sessions[sessionKey].celebrated = true; });
  };

  return (
    <div>
      {celebration && <Celebration {...celebration} onClose={() => setCelebration(null)} />}
      <Row style={{ gap: 4, flexWrap: "wrap", padding: "6px 2px 12px", alignItems: "center" }}>
        <button className="ll-chip ll-day" disabled={wIdx <= 0} aria-label="previous week"
          style={{ opacity: wIdx <= 0 ? 0.35 : 1 }}
          onClick={() => setWeekOffset(weekOffset - 1)}>‹</button>
        {DAYS.map((d) => {
          const st = dayWeekStatus(data, d, wIdx);
          return (
            <button key={d} className={`ll-chip ll-day ${d === day ? "on" : ""} ${st === "star" ? "starred" : ""} ${OPTIONAL_DAYS[d] ? "optional" : ""}`} onClick={() => setDay(d)}>
              <DayStatusIcon status={st} size={7} />
              {DAYS.length > 4 ? d.slice(0, 1) : d.slice(0, 3)}
            </button>
          );
        })}
        <button className="ll-chip ll-day" disabled={wIdx >= maxWeek} aria-label="next week"
          style={{ opacity: wIdx >= maxWeek ? 0.35 : 1 }}
          onClick={() => setWeekOffset(weekOffset + 1)}>›</button>
      </Row>
      <Row style={{ justifyContent: "space-between", marginBottom: 10 }}>
        <div>
          <div className="ll-display" style={{ fontSize: 26, fontWeight: 700 }}>
            {day} <span style={{ color: T.muted, fontSize: 17, fontWeight: 500 }}>· {fmtDate(dateFor)}</span>
          </div>
          <div style={{ color: T.muted, fontSize: 13 }}>
            Cycle {data.cycleNumber} · Week {wIdx + 1}{OPTIONAL_DAYS[day] ? " · optional day" : ""}{isToday ? " · today" : weekOffset < 0 ? " · past week" : weekOffset > 0 ? " · upcoming" : ""}
          </div>
        </div>
      </Row>
      {exList.map((ex) => (
        <ExerciseCard key={ex.id} data={data} update={update} ex={ex} sessionKey={sessionKey} dayColor={DAY_COLOR[day]} />
      ))}
      {exList.length > 0 && weekOffset === 0 && (() => {
        const done = !!(sess && sess.celebrated);
        const ready = complete && !done;
        return (
          <button disabled={!ready} onClick={fireCelebration}
            style={{
              width: "100%", padding: 14, marginTop: 4, fontSize: 15, fontWeight: 700,
              borderRadius: 12, cursor: ready ? "pointer" : "default", fontFamily: "inherit",
              background: ready ? T.pos : done ? "rgba(105,181,109,0.15)" : T.surface2,
              border: `1px solid ${ready ? T.pos : done ? "rgba(105,181,109,0.45)" : T.line}`,
              color: ready ? "#0F1512" : done ? T.pos : T.faint,
              opacity: ready || done ? 1 : 0.65,
              boxShadow: ready ? "0 0 12px rgba(105,181,109,0.4)" : "none",
            }}>
            {done ? "★ Workout finished" : ready ? "Finish Workout" : `Finish Workout · ${filledSets}/${totalSets} sets`}
          </button>
        );
      })()}
      {exList.length === 0 && (
        <div style={{ color: T.muted, textAlign: "center", padding: 30 }}>
          No exercises for {day} yet. Add some in Manage.
        </div>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Progress view                                                       */
/* ------------------------------------------------------------------ */
/* ------------------------------------------------------------------ */
/* Cycle grid — the whole cycle at a glance, like the sheet's columns  */
/* ------------------------------------------------------------------ */
function CycleGrid({ data, onOpenDay, onGoToday }) {
  const today = todayISO();
  const curWeek = Math.max(0, weekOfCycle(data, today));
  const weeks = Math.max(data.cycleWeeks || 8, curWeek + 1);
  const cols = Array.from({ length: weeks }, (_, w) => w);
  const monthOf = (w) =>
    new Date(addDays(data.cycleStart, w * 7) + "T12:00:00").toLocaleDateString("en-US", { month: "short" });
  const domOf = (w) => new Date(addDays(data.cycleStart, w * 7) + "T12:00:00").getDate();

  return (
    <div className="ll-card" style={{ padding: "12px 14px", marginBottom: 14 }}>
      <Row style={{ justifyContent: "space-between", marginBottom: 10 }}>
        <span className="ll-display" style={{ fontSize: 16, fontWeight: 600, letterSpacing: "0.05em", textTransform: "uppercase" }}>
          {data.cycleName || `Cycle ${data.cycleNumber}`}
        </span>
        <span className="ll-num" style={{ color: T.faint, fontSize: 11.5 }}>week {Math.min(curWeek + 1, weeks)} of {weeks}</span>
      </Row>
      <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        <div style={{ minWidth: weeks * 30 + 46 }}>
          <Row style={{ gap: 4 }}>
            <span style={{ width: 42, flex: "none" }} />
            {cols.map((w) => (
              <span key={w} style={{ width: 26, flex: "none", fontSize: 9, color: T.faint, whiteSpace: "nowrap", overflow: "visible" }}>
                {w === 0 || monthOf(w) !== monthOf(w - 1) ? monthOf(w) : ""}
              </span>
            ))}
          </Row>
          <Row style={{ gap: 4, marginBottom: 5 }}>
            <span style={{ width: 42, flex: "none" }} />
            {cols.map((w) => (
              <span key={w} style={{ width: 26, flex: "none", textAlign: "center" }}>
                <span className="ll-num" style={{ display: "block", fontSize: 10, color: w === curWeek ? T.ink : T.faint, fontWeight: w === curWeek ? 700 : 400 }}>{w + 1}</span>
                <span className="ll-num" style={{ display: "block", fontSize: 8.5, color: T.faint }}>{domOf(w)}</span>
              </span>
            ))}
          </Row>
          {DAYS.map((d) => (
            <Row key={d} style={{ gap: 4, marginBottom: 5 }}>
              <span style={{ width: 42, flex: "none", fontSize: 11, color: T.muted, alignSelf: "center" }}>{d.slice(0, 3)}</span>
              {cols.map((w) => {
                const sess = daySessionIn(data, d, w);
                const dateIso = cellDateFor(data.cycleStart, w, d);
                let style = {
                  width: 26, height: 22, flex: "none", borderRadius: 5, padding: 0,
                  border: `1px solid ${T.line}`, background: "transparent",
                  color: T.faint, fontSize: 9, cursor: "default", fontFamily: "inherit",
                };
                let content = "";
                let onClick;
                if (sess) {
                  let prev = null;
                  for (let i = w - 1; i >= 0; i--) { const p = daySessionIn(data, d, i); if (p) { prev = p; break; } }
                  const dv = dayVolume(sess);
                  const pv = prev ? dayVolume(prev) : null;
                  if (pv !== null && dv > pv) {
                    content = "★";
                    style.fontSize = 13;
                    style.color = "#F6C851";
                    style.textShadow = "0 0 7px rgba(246,200,81,0.75)";
                    style.background = "rgba(246,200,81,0.1)";
                    style.border = "1px solid rgba(246,200,81,0.4)";
                  } else if (pv !== null && dv < pv) {
                    content = <span style={{ width: 8, height: 8, borderRadius: 4, background: T.neg, display: "inline-block" }} />;
                  } else {
                    content = <span style={{ width: 8, height: 8, borderRadius: 4, background: T.pos, display: "inline-block" }} />;
                  }
                  style.cursor = "pointer";
                  onClick = () => onOpenDay(sess.key);
                } else if (dateIso === today) {
                  style.border = `2px solid ${T.blue}`;
                  style.cursor = "pointer";
                  onClick = () => onGoToday(d);
                } else if (dateIso < today) {
                  if (OPTIONAL_DAYS[d]) {
                    content = "•";
                    style.opacity = 0.55;
                  } else {
                    content = "✕";
                  }
                } else {
                  style.opacity = 0.35;
                }
                return (
                  <button key={w} style={style} onClick={onClick} disabled={!onClick}
                    title={`${d} · ${fmtDate(dateIso)}`}
                    aria-label={`${d} ${fmtDate(dateIso)}${sess ? ", open log" : dateIso < today ? ", missed" : ""}`}>
                    {content}
                  </button>
                );
              })}
            </Row>
          ))}
        </div>
      </div>
      <Row style={{ gap: 12, marginTop: 9, flexWrap: "wrap" }}>
        <Row style={{ gap: 5 }}><span className="ll-star" style={{ fontSize: 12 }}>★</span><span style={{ fontSize: 10.5, color: T.faint }}>beat prev week</span></Row>
        <Row style={{ gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 4, background: T.neg, flex: "none" }} /><span style={{ fontSize: 10.5, color: T.faint }}>vol down</span></Row>
        <Row style={{ gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 4, background: T.pos, flex: "none" }} /><span style={{ fontSize: 10.5, color: T.faint }}>logged</span></Row>
        <Row style={{ gap: 5 }}><span style={{ fontSize: 10.5, color: T.faint }}>✕ missed</span></Row>
        {DAYS.some((d) => OPTIONAL_DAYS[d]) && (
          <Row style={{ gap: 5 }}><span style={{ fontSize: 10.5, color: T.faint }}>• optional rest</span></Row>
        )}
        <Row style={{ gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 4, border: `2px solid ${T.blue}`, flex: "none" }} /><span style={{ fontSize: 10.5, color: T.faint }}>today</span></Row>
      </Row>
    </div>
  );
}

function ProgressView({ data, day, setDay, onGoToday }) {
  const [openEx, setOpenEx] = useState(null);
  const [openDayKey, setOpenDayKey] = useState(null);

  /* Day log drill-in from the cycle grid */
  if (openDayKey && data.sessions[openDayKey]) {
    const sess = data.sessions[openDayKey];
    const d = sess.day;
    const w = weekOfCycle(data, sess.date);
    let prev = null;
    for (let i = w - 1; i >= 0; i--) { const p = daySessionIn(data, d, i); if (p) { prev = p; break; } }
    const vol = dayVolume(sess);
    const delta = prev ? pct(dayVolume(prev), vol) : null;
    return (
      <div className="ll-fade">
        <button className="ll-btn ll-btn-sm" style={{ marginBottom: 12 }} onClick={() => setOpenDayKey(null)}>← Back</button>
        <Row style={{ justifyContent: "space-between", marginBottom: 2 }}>
          <div className="ll-display" style={{ fontSize: 24, fontWeight: 700 }}>{d} · {fmtDate(sess.date)}</div>
          <Delta value={delta} />
        </Row>
        <div style={{ color: T.muted, fontSize: 13, marginBottom: 14 }}>
          Week {w + 1} · day volume <span className="ll-num">{fmtVol(vol)}</span>
          {prev ? ` · vs week ${weekOfCycle(data, prev.date) + 1}` : ""}
        </div>
        {data.exercises.filter((e) => e.day === d).map((ex) => {
          const e = sess.entries[ex.id];
          if (!entryHasData(e)) return null;
          const vName = (ex.variants.find((v) => v.id === e.variantId) || {}).name || "";
          const evol = volumeOf(e.sets);
          const prevSame = lastEntryFor(data, ex.id, e.variantId, openDayKey, sess.date);
          const exDelta = prevSame ? pct(volumeOf(prevSame.entry.sets), evol) : null;
          const won = exDelta !== null && exDelta > 0;
          const exStrip = won ? T.pos : exDelta !== null && exDelta < 0 ? T.neg : T.amber;
          return (
            <div key={ex.id} className="ll-card" style={{ padding: "11px 13px" }}>
              <Row style={{ gap: 9, alignItems: "stretch" }}>
                <span style={{ width: 4, borderRadius: 2, background: exStrip, flex: "none", boxShadow: won ? "0 0 8px rgba(105,181,109,0.7)" : "none" }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <Row style={{ justifyContent: "space-between", marginBottom: 4 }}>
                    <span className="ll-display" style={{ fontSize: 16, fontWeight: 600 }}>
                      {e.swapName || ex.name}
                      {e.swapName ? <span style={{ color: T.amber, fontSize: 11.5, marginLeft: 6, fontFamily: "Barlow" }}>swapped</span> : null}
                    </span>
                    <Row style={{ gap: 8, flex: "none" }}>
                      <Delta value={exDelta} />
                      <span className="ll-num" style={{ color: T.muted, fontSize: 12.5 }}>
                        {evol > 0 ? fmtVol(evol) : `${repsOf(e.sets)} reps`}
                      </span>
                    </Row>
                  </Row>
                  {vName && vName !== "Usual machine" && (
                    <div style={{ color: T.muted, fontSize: 12, marginBottom: 3 }}>{vName}</div>
                  )}
                  <div className="ll-num" style={{ fontSize: 14.5 }}>{setsLine(e.sets)}</div>
                  {e.note ? <div className="ll-note" style={{ marginTop: 8 }}>“{e.note}”</div> : null}
                </div>
              </Row>
            </div>
          );
        })}
      </div>
    );
  }
  const exList = data.exercises.filter((e) => e.day === day);

  if (openEx) {
    const ex = data.exercises.find((e) => e.id === openEx);
    const hist = historyFor(data, ex.id);
    const maxVol = Math.max(1, ...hist.map((h) => volumeOf(h.entry.sets)));
    const rows = hist.map((h, i) => {
      const vol = volumeOf(h.entry.sets);
      /* find previous session with the SAME machine for a fair delta */
      let prevSame = null;
      for (let j = i - 1; j >= 0; j--) {
        if (hist[j].entry.variantId === h.entry.variantId) { prevSame = hist[j]; break; }
      }
      const machineChanged = i > 0 && hist[i - 1].entry.variantId !== h.entry.variantId;
      return { ...h, vol, delta: prevSame ? pct(volumeOf(prevSame.entry.sets), vol) : null, machineChanged };
    }).reverse();

    return (
      <div className="ll-fade">
        <button className="ll-btn ll-btn-sm" style={{ marginBottom: 12 }} onClick={() => setOpenEx(null)}>← Back</button>
        <div className="ll-display" style={{ fontSize: 24, fontWeight: 700, marginBottom: 2 }}>{ex.name}</div>
        <div style={{ color: T.muted, fontSize: 13, marginBottom: 14 }}>
          {day} · volume = weight × reps, all sets · compared only against the same machine
        </div>
        {rows.map((r) => {
          const vi = ex.variants.findIndex((v) => v.id === r.entry.variantId);
          const vName = (ex.variants[vi] || { name: "Usual machine" }).name;
          return (
            <div key={r.key} className="ll-card" style={{ padding: "11px 13px" }}>
              <Row style={{ justifyContent: "space-between", marginBottom: 6 }}>
                <Row style={{ gap: 7 }}>
                  <span className="ll-num" style={{ fontSize: 13.5, fontWeight: 700 }}>{fmtDate(r.date)}</span>
                  {ex.variants.length > 1 && (
                    <Row style={{ gap: 5 }}>
                      <VariantDot index={Math.max(0, vi)} />
                      <span style={{ color: T.muted, fontSize: 12 }}>{vName}</span>
                    </Row>
                  )}
                  {r.entry.swapName && <span style={{ color: T.amber, fontSize: 12 }}>did {r.entry.swapName}</span>}
                </Row>
                {r.machineChanged && r.delta === null
                  ? <span style={{ color: T.faint, fontSize: 12 }}>machine changed</span>
                  : <Delta value={r.delta} />}
              </Row>
              <PlateBar frac={r.vol / maxVol} color={T.amber} />
              <Row style={{ justifyContent: "space-between", marginTop: 7 }}>
                <span className="ll-num" style={{ color: T.muted, fontSize: 13 }}>{setsLine(r.entry.sets)}</span>
                <span className="ll-num" style={{ fontSize: 13, color: T.ink }}>{r.vol > 0 ? fmtVol(r.vol) : `${repsOf(r.entry.sets)} reps`}</span>
              </Row>
              {r.entry.note ? <div className="ll-note" style={{ marginTop: 8 }}>“{r.entry.note}”</div> : null}
            </div>
          );
        })}
        {rows.length === 0 && <div style={{ color: T.muted, textAlign: "center", padding: 30 }}>Nothing logged yet.</div>}
      </div>
    );
  }

  return (
    <div>
      <Row style={{ gap: 4, flexWrap: "wrap", padding: "6px 2px 12px" }}>
        {DAYS.map((d) => {
          const st = dayWeekStatus(data, d);
          return (
            <button key={d} className={`ll-chip ll-day ${d === day ? "on" : ""} ${st === "star" ? "starred" : ""} ${OPTIONAL_DAYS[d] ? "optional" : ""}`} onClick={() => setDay(d)}>
              <DayStatusIcon status={st} size={7} />
              {DAYS.length > 4 ? d.slice(0, 1) : d.slice(0, 3)}
            </button>
          );
        })}
      </Row>
      <div className="ll-display" style={{ fontSize: 26, fontWeight: 700, marginBottom: 2 }}>Progress</div>
      <div style={{ color: T.muted, fontSize: 13, marginBottom: 14 }}>Week-over-week total volume, same machine only</div>
      <CycleGrid data={data} onOpenDay={setOpenDayKey} onGoToday={onGoToday} />
      {exList.map((ex) => {
        const hist = historyFor(data, ex.id);
        const last = hist[hist.length - 1];
        let delta = null;
        if (last) {
          for (let j = hist.length - 2; j >= 0; j--) {
            if (hist[j].entry.variantId === last.entry.variantId) {
              delta = pct(volumeOf(hist[j].entry.sets), volumeOf(last.entry.sets));
              break;
            }
          }
        }
        const mini = hist.slice(-6);
        const maxV = Math.max(1, ...mini.map((h) => volumeOf(h.entry.sets)));
        return (
          <div key={ex.id} className="ll-card" style={{ padding: "12px 14px", cursor: "pointer" }} onClick={() => setOpenEx(ex.id)}>
            <Row style={{ justifyContent: "space-between" }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div className="ll-display" style={{ fontSize: 17, fontWeight: 600 }}>{ex.name}</div>
                <Row style={{ gap: 3, marginTop: 8, alignItems: "flex-end", height: 26 }}>
                  {mini.map((h, i) => {
                    const same = last && h.entry.variantId === last.entry.variantId;
                    return (
                      <div key={i} style={{
                        width: 14,
                        height: Math.max(3, (volumeOf(h.entry.sets) / maxV) * 26),
                        background: same ? T.amber : T.line,
                        borderRadius: 2,
                      }} />
                    );
                  })}
                  {mini.length === 0 && <span style={{ color: T.faint, fontSize: 12 }}>no data</span>}
                </Row>
              </div>
              <div style={{ textAlign: "right", flex: "none" }}>
                <Delta value={delta} />
                <div style={{ color: T.faint, fontSize: 11.5, marginTop: 3 }}>vs last time</div>
              </div>
            </Row>
          </div>
        );
      })}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Manage view                                                         */
/* ------------------------------------------------------------------ */
function ManageView({ data, update, reseed, restore }) {
  const [confirmCycle, setConfirmCycle] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [showBackup, setShowBackup] = useState(false);
  const [sheetText, setSheetText] = useState(null);

  const exportSheet = () => {
    const rows = buildSheetRows(data);
    try {
      const blob = new Blob([toCSV(rows)], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `franco-fit-cycle-${data.cycleNumber}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    } catch { /* fall through to copy option below */ }
    setSheetText(toTSV(rows));
  };

  const [importText, setImportText] = useState("");
  const [importMsg, setImportMsg] = useState("");

  const downloadBackup = () => {
    try {
      const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `franco-fit-backup-${todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    } catch {}
  };

  const doImport = () => {
    try {
      const next = JSON.parse(importText);
      if (!next || !Array.isArray(next.exercises) || typeof next.sessions !== "object") throw new Error("bad shape");
      if (!next.unit) next.unit = data.unit || "kg";
      restore(next);
      setImportMsg("Restored — all data replaced from the backup.");
      setImportText("");
    } catch {
      setImportMsg("That doesn't look like a valid backup. Nothing was changed.");
    }
  };
  const [newNames, setNewNames] = useState({});
  const [editing, setEditing] = useState(null);
  const [editText, setEditText] = useState("");

  const weekNum = Math.max(1, Math.floor((new Date(todayISO()) - new Date(data.cycleStart)) / (7 * 864e5)) + 1);

  const startNewCycle = () =>
    update((d) => {
      d.exercises.forEach((ex) => {
        const last = lastEntryFor(d, ex.id, null, null);
        if (last) {
          const top = Math.max(...last.entry.sets.map((s) => num(s.w)));
          ex.prev = isFinite(top) ? top : ex.prev;
        }
      });
      d.cycleNumber += 1;
      d.cycleName = `Cycle ${d.cycleNumber}`;
      d.cycleStart = todayISO();
    });

  return (
    <div>
      <div className="ll-display" style={{ fontSize: 26, fontWeight: 700, marginBottom: 12 }}>Manage</div>

      {/* Name */}
      <div className="ll-card" style={{ padding: 14 }}>
        <div className="ll-display" style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Name</div>
        <input className="ll-input" placeholder="Your name" value={data.userName || ""}
          onChange={(e) => update((d) => { d.userName = e.target.value; })} />
      </div>

      {/* Units */}
      <div className="ll-card" style={{ padding: 14 }}>
        <Row style={{ justifyContent: "space-between" }}>
          <div>
            <div className="ll-display" style={{ fontSize: 18, fontWeight: 600 }}>Units</div>
            <div style={{ color: T.muted, fontSize: 12.5, marginTop: 2 }}>
              Label only — your logged numbers never convert.
            </div>
          </div>
          <Row style={{ gap: 6 }}>
            {["kg", "lb"].map((u) => (
              <button key={u} className={`ll-chip ${(data.unit || "kg") === u ? "on" : ""}`}
                style={(data.unit || "kg") === u ? { borderColor: T.amber, color: T.amber } : {}}
                onClick={() => update((d) => { d.unit = u; })}>
                {u}
              </button>
            ))}
          </Row>
        </Row>
      </div>

      {/* Cycle */}
      <div className="ll-card" style={{ padding: 14 }}>
        <div className="ll-display" style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Cycle</div>
        <Row style={{ marginBottom: 8 }}>
          <input className="ll-input" value={data.cycleName || ""} placeholder="Cycle name (e.g. Summer cut)"
            onChange={(e) => update((d) => { d.cycleName = e.target.value; })} />
        </Row>
        <Row style={{ gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
          <span style={{ color: T.muted, fontSize: 13 }}>Length:</span>
          <button className="ll-btn ll-btn-sm" onClick={() => update((d) => { d.cycleWeeks = Math.max(1, (d.cycleWeeks || 8) - 1); })}>−</button>
          <span className="ll-num" style={{ fontSize: 15, fontWeight: 700 }}>{data.cycleWeeks || 8} wk</span>
          <button className="ll-btn ll-btn-sm" onClick={() => update((d) => { d.cycleWeeks = (d.cycleWeeks || 8) + 1; })}>+</button>
          <span style={{ color: T.faint, fontSize: 12.5, marginLeft: "auto" }}>Started {fmtDate(data.cycleStart)} · week {weekNum}</span>
        </Row>
        <div style={{ color: T.muted, fontSize: 13, marginBottom: 10 }}>
          Starting a new cycle saves each exercise's latest top weight as its "last cycle" reference — the number you used to copy into the Prev column.
        </div>
        {confirmCycle ? (
          <Row>
            <button className="ll-btn ll-btn-chalk" style={{ flex: 1 }} onClick={() => { startNewCycle(); setConfirmCycle(false); }}>
              Yes, start cycle {data.cycleNumber + 1}
            </button>
            <button className="ll-btn" onClick={() => setConfirmCycle(false)}>Cancel</button>
          </Row>
        ) : (
          <button className="ll-btn" onClick={() => setConfirmCycle(true)}>Start new cycle</button>
        )}
      </div>

      {/* Schedule */}
      {DAYS.map((day) => (
        <div key={day} className="ll-card" style={{ padding: 14 }}>
          <Row style={{ gap: 8, marginBottom: 10 }}>
            <span style={{ width: 10, height: 10, borderRadius: 5, background: DAY_COLOR[day] }} />
            <span className="ll-display" style={{ fontSize: 18, fontWeight: 600 }}>{day}</span>
          </Row>
          {data.exercises.filter((e) => e.day === day).map((ex, i, arr) => (
            <Row key={ex.id} style={{ justifyContent: "space-between", padding: "7px 0", borderBottom: `1px solid ${T.line}` }}>
              {editing === ex.id ? (
                <div style={{ flex: 1 }}>
                  <Row>
                    <input className="ll-input" autoFocus value={editText} onChange={(e) => setEditText(e.target.value)} />
                    <button className="ll-btn ll-btn-sm ll-btn-chalk" onClick={() => {
                      const t = editText.trim();
                      if (t) update((d) => { d.exercises.find((x) => x.id === ex.id).name = t; });
                      setEditing(null);
                    }}>Done</button>
                  </Row>
                  <Row style={{ marginTop: 6, gap: 8 }}>
                    <span style={{ color: T.muted, fontSize: 13 }}>Planned sets:</span>
                    <button className="ll-btn ll-btn-sm" onClick={() =>
                      update((d) => { const x = d.exercises.find((x) => x.id === ex.id); x.targetSets = Math.max(1, (x.targetSets || 3) - 1); })}>−</button>
                    <span className="ll-num" style={{ fontSize: 15, fontWeight: 700 }}>{ex.targetSets || 3}</span>
                    <button className="ll-btn ll-btn-sm" onClick={() =>
                      update((d) => { const x = d.exercises.find((x) => x.id === ex.id); x.targetSets = (x.targetSets || 3) + 1; })}>+</button>
                  </Row>
                </div>
              ) : (
                <>
                  <span style={{ fontSize: 15 }}>
                    {ex.name} <span className="ll-num" style={{ color: T.faint, fontSize: 12 }}>· {ex.targetSets || 3} sets</span>
                  </span>
                  <Row style={{ gap: 4 }}>
                    <button className="ll-btn ll-btn-sm" disabled={i === 0} style={{ opacity: i === 0 ? 0.35 : 1 }}
                      onClick={() => update((d) => {
                        const list = d.exercises;
                        const idxA = list.findIndex((x) => x.id === ex.id);
                        const idxB = list.findIndex((x) => x.id === arr[i - 1].id);
                        [list[idxA], list[idxB]] = [list[idxB], list[idxA]];
                      })}>↑</button>
                    <button className="ll-btn ll-btn-sm" disabled={i === arr.length - 1} style={{ opacity: i === arr.length - 1 ? 0.35 : 1 }}
                      onClick={() => update((d) => {
                        const list = d.exercises;
                        const idxA = list.findIndex((x) => x.id === ex.id);
                        const idxB = list.findIndex((x) => x.id === arr[i + 1].id);
                        [list[idxA], list[idxB]] = [list[idxB], list[idxA]];
                      })}>↓</button>
                    <button className="ll-btn ll-btn-sm" onClick={() => { setEditing(ex.id); setEditText(ex.name); }}>✎</button>
                    <button className="ll-btn ll-btn-sm" style={{ color: T.neg }}
                      onClick={() => update((d) => { d.exercises = d.exercises.filter((x) => x.id !== ex.id); })}>✕</button>
                  </Row>
                </>
              )}
            </Row>
          ))}
          <Row style={{ marginTop: 10 }}>
            <input className="ll-input" placeholder="Add exercise…" value={newNames[day] || ""}
              onChange={(e) => setNewNames({ ...newNames, [day]: e.target.value })} />
            <button className="ll-btn ll-btn-sm ll-btn-chalk" onClick={() => {
              const name = (newNames[day] || "").trim();
              if (!name) return;
              update((d) => {
                d.exercises.push({
                  id: slug(`${day}-${Date.now()}-${name}`),
                  day, name, prev: null, targetSets: 3,
                  variants: [{ id: "main", name: "Usual machine" }],
                  activeVariant: "main",
                });
              });
              setNewNames({ ...newNames, [day]: "" });
            }}>Add</button>
          </Row>
        </div>
      ))}

      {/* Backup / reset */}
      <div className="ll-card" style={{ padding: 14 }}>
        <div className="ll-display" style={{ fontSize: 18, fontWeight: 600, marginBottom: 10 }}>Data</div>
        <Row style={{ marginBottom: 10 }}>
          <button className="ll-btn ll-btn-chalk" style={{ flex: 1 }} onClick={exportSheet}>
            Export sheet (CSV)
          </button>
        </Row>
        {sheetText !== null && (
          <div style={{ marginBottom: 10 }}>
            <div style={{ color: T.muted, fontSize: 12.5, marginBottom: 6 }}>
              Download started. If it didn't, tap the box below to select everything, copy, and paste straight into a blank Google Sheet — columns split automatically.
            </div>
            <textarea className="ll-input" readOnly rows={5} value={sheetText} onFocus={(e) => e.target.select()} />
          </div>
        )}
        <Row style={{ marginBottom: 10 }}>
          <button className="ll-btn" style={{ flex: 1 }} onClick={downloadBackup}>Download backup (.json)</button>
          <button className="ll-btn" style={{ flex: 1 }} onClick={() => { setShowBackup(!showBackup); setImportMsg(""); }}>
            {showBackup ? "Hide restore" : "Restore backup"}
          </button>
        </Row>
        {showBackup && (
          <div style={{ marginBottom: 10 }}>
            <div style={{ color: T.muted, fontSize: 12.5, marginBottom: 6 }}>
              Open a backup .json file, copy its contents, paste below. Restoring replaces everything currently in the app.
            </div>
            <textarea className="ll-input" rows={5} placeholder="Paste backup JSON here…" value={importText}
              onChange={(e) => setImportText(e.target.value)} />
            <Row style={{ marginTop: 8 }}>
              <button className="ll-btn ll-btn-chalk" style={{ flex: 1 }} onClick={doImport}>Restore from pasted backup</button>
            </Row>
            {importMsg && (
              <div style={{ color: importMsg.startsWith("Restored") ? T.pos : T.neg, fontSize: 12.5, marginTop: 6 }}>{importMsg}</div>
            )}
          </div>
        )}
        <div style={{ marginTop: 10 }}>
          {confirmReset ? (
            <Row>
              <button className="ll-btn" style={{ flex: 1, color: T.neg }} onClick={() => { reseed(); setConfirmReset(false); }}>
                Yes, wipe everything and re-import the sheet
              </button>
              <button className="ll-btn" onClick={() => setConfirmReset(false)}>Cancel</button>
            </Row>
          ) : (
            <button className="ll-btn ll-btn-sm" style={{ color: T.neg }} onClick={() => setConfirmReset(true)}>Reset to sheet data</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Rest timer — lives in the tab bar, styled apart from the text tabs  */
/* ------------------------------------------------------------------ */
function RestTimer() {
  const [startTs, setStartTs] = useState(null);
  const [, tick] = useState(0);
  useEffect(() => {
    if (!startTs) return;
    const iv = setInterval(() => tick((n) => n + 1), 500);
    return () => clearInterval(iv);
  }, [startTs]);

  const secs = startTs ? Math.floor((Date.now() - startTs) / 1000) : 0;
  const m = Math.floor(secs / 60);
  const s = String(secs % 60).padStart(2, "0");
  const long = secs >= 90;

  return (
    <div className="ll-resttab">
      {startTs ? (
        <div className={`ll-restpill on ${long ? "long" : ""}`}>
          <button className="ll-restmain ll-num" onClick={() => setStartTs(Date.now())} aria-label="restart rest timer">
            {m}:{s}
          </button>
          <button className="ll-reststop" aria-label="stop rest timer" onClick={() => setStartTs(null)}>✕</button>
        </div>
      ) : (
        <button className="ll-restpill" onClick={() => setStartTs(Date.now())} aria-label="start rest timer">⏱ REST</button>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* First-run name popup                                                */
/* ------------------------------------------------------------------ */
function NamePopup({ onSave, onSkip }) {
  const [name, setName] = useState("");
  return (
    <div className="ll-celebrate" style={{ zIndex: 120 }}>
      <div className="ll-card" style={{ padding: 20, width: "100%", maxWidth: 340, textAlign: "left" }}>
        <div className="ll-display" style={{ fontSize: 24, fontWeight: 700, marginBottom: 6 }}>Welcome to Franco Fit</div>
        <div style={{ color: T.muted, fontSize: 13.5, marginBottom: 12 }}>
          What should we call you
        </div>
        <input className="ll-input" autoFocus placeholder="Your name" value={name}
          onChange={(e) => setName(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && name.trim()) onSave(name.trim()); }} />
        <Row style={{ marginTop: 12 }}>
          <button className="ll-btn ll-btn-chalk" style={{ flex: 1, opacity: name.trim() ? 1 : 0.5 }} disabled={!name.trim()}
            onClick={() => onSave(name.trim())}>Let's go</button>
          <button className="ll-btn" onClick={onSkip}>Later</button>
        </Row>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* App                                                                 */
/* ------------------------------------------------------------------ */
const window_storage = {
  async get(k) { const v = localStorage.getItem(k); return v == null ? null : { key: k, value: v }; },
  async set(k, v) { localStorage.setItem(k, v); return { key: k, value: v }; },
};

/* Version J keeps the full sheet history seed */
function seedJ() {
  const d = buildSeed();
  d.userName = "Franco";
  d.nameAsked = true;
  return d;
}

const STORAGE_KEY = "franco-fit-j-v1";

function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("today");
  const [day, setDay] = useState(defaultDay());
  const [saveState, setSaveState] = useState("saved");
  const [loadError, setLoadError] = useState(false);
  const timer = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await window_storage.get(STORAGE_KEY);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          if (!parsed.unit) parsed.unit = "kg";
          if (!parsed.cycleWeeks) parsed.cycleWeeks = 8;
          if (!parsed.cycleName) parsed.cycleName = `Cycle ${parsed.cycleNumber || 1}`;
          if (parsed.userName === undefined) { parsed.userName = ""; parsed.nameAsked = false; }
          setData(parsed);
          return;
        }
        throw new Error("empty");
      } catch {
        const seed = seedJ();
        setData(seed);
        try { await window_storage.set(STORAGE_KEY, JSON.stringify(seed)); }
        catch { setLoadError(true); }
      }
    })();
  }, []);

  const scheduleSave = (next) => {
    setSaveState("saving");
    if (timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(async () => {
      try {
        await window_storage.set(STORAGE_KEY, JSON.stringify(next));
        setSaveState("saved");
      } catch {
        setSaveState("error");
      }
    }, 800);
  };

  const update = (fn) => {
    setData((prev) => {
      const next = structuredClone(prev);
      fn(next);
      scheduleSave(next);
      return next;
    });
  };

  const reseed = () => {
    const seed = seedJ();
    setData(seed);
    scheduleSave(seed);
  };

  if (!data) {
    return (
      <div className="ll-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
        <style>{CSS}</style>
        <span className="ll-display" style={{ color: T.muted, fontSize: 18, letterSpacing: "0.15em" }}>LOADING…</span>
      </div>
    );
  }

  return (
    <div className="ll-root">
      <style>{CSS}</style>
      <div className="ll-shell">
        <Row style={{ justifyContent: "space-between", padding: "18px 0 14px" }}>
          <Row style={{ gap: 10, alignItems: "baseline" }}>
            <span className="ll-display" style={{ fontSize: 17, fontWeight: 700, letterSpacing: "0.18em" }}>FRANCO FIT</span>
            <span className="ll-num" style={{ color: T.faint, fontSize: 12 }}>
              {new Date().toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}
            </span>
          </Row>
          <span style={{ fontSize: 11.5, color: saveState === "error" ? T.neg : T.faint }} className="ll-num">
            {saveState === "saving" ? "saving…" : saveState === "error" ? "save failed — retry by editing" : "saved"}
          </span>
        </Row>
        {loadError && <div className="ll-note" style={{ marginBottom: 10 }}>This browser is blocking storage — logs won't persist. Avoid private/incognito mode.</div>}
        {tab === "today" && <TodayView data={data} update={update} day={day} setDay={setDay} />}
        {tab === "progress" && (
          <ProgressView data={data} day={day} setDay={setDay}
            onGoToday={(d) => { setDay(d); setTab("today"); }} />
        )}
        {tab === "manage" && <ManageView data={data} update={update} reseed={reseed} restore={(next) => { setData(next); scheduleSave(next); }} />}
      </div>
      <nav className="ll-tabbar">
        {[["today", "Log"], ["progress", "Progress"], ["manage", "Manage"]].map(([id, label]) => (
          <button key={id} className={`ll-tab ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}>
            {label}
            <div className="ll-tabline" />
          </button>
        ))}
        <RestTimer />
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
