/* Manage view                                                         */
/* ------------------------------------------------------------------ */
function ManageView({ data, update, reseed, restore }) {
  const [confirmCycle, setConfirmCycle] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [showBackup, setShowBackup] = useState(false);
  const [sheetText, setSheetText] = useState(null);
  const [notePub, setNotePub] = useState(null);
  const [noteDate, setNoteDate] = useState("");
  const [noteText, setNoteText] = useState("");
  const [noteImg, setNoteImg] = useState(null);
  const [imgBusy, setImgBusy] = useState(false);
  const [seenToast, setSeenToast] = useState(null);
  useEffect(() => {
    if (!CLOUD_SYNC.enabled) return;
    CLOUD_SYNC.fetchById(PARTNER_PUB).then((pub) => {
      setNotePub(pub);
      const acks = (pub && pub.acks) || {};
      const seen = (data.sentNotes || []).filter((n) => acks[n.id]);
      if (seen.length) {
        /* Flash a "she saw it" confirmation, then drop the seen note(s) — no
           reason to keep them (or their photos) in the queue or the inbox row. */
        setSeenToast(`💌 ${PARTNER_NAME} saw your ${seen.length > 1 ? "notes" : "note"}`);
        update((d) => { d.sentNotes = (d.sentNotes || []).filter((n) => !acks[n.id]); pushInbox(d); });
      }
    });
  }, []);
  useEffect(() => {
    if (!seenToast) return;
    const t = setTimeout(() => setSeenToast(null), 3500);
    return () => clearTimeout(t);
  }, [seenToast]);
  const partnerName = PARTNER_NAME;
  const workoutDates = notePub && notePub.schedule ? upcomingWorkoutDates(notePub.schedule, 8) : [];
  const sentNotes = data.sentNotes || [];
  const pushInbox = (d) => { if (CLOUD_SYNC.enabled) CLOUD_SYNC.pushTo(PARTNER_INBOX, { notes: d.sentNotes || [] }); };
  const pickImage = async (e) => {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    setImgBusy(true);
    try { setNoteImg(await compressImage(f, 1000, 0.6)); } catch {}
    setImgBusy(false);
  };
  const sendNote = () => {
    const text = noteText.trim();
    if (!text && !noteImg) return;
    const date = noteDate || workoutDates[0] || todayISO();
    update((d) => {
      if (!d.sentNotes) d.sentNotes = [];
      const note = { id: `${Date.now()}`, date, text, createdAt: Date.now() };
      if (noteImg) note.image = noteImg;
      d.sentNotes.push(note);
      pushInbox(d);
    });
    setNoteText(""); setNoteDate(""); setNoteImg(null);
  };
  const removeNote = (id) => update((d) => { d.sentNotes = (d.sentNotes || []).filter((n) => n.id !== id); pushInbox(d); });

  const exportSheet = () => {
    const rows = buildSheetRows(data);
    try {
      const blob = new Blob([toCSV(rows)], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `franco-fit-cycle-${data.cycleNumber}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    } catch { /* fall through to copy option below */ }
    setSheetText(toTSV(rows));
  };

  const [importText, setImportText] = useState("");
  const [importMsg, setImportMsg] = useState("");
  const [syncInput, setSyncInput] = useState("");
  const [syncMsg, setSyncMsg] = useState("");
  const cloud = typeof CLOUD_SYNC !== "undefined" && CLOUD_SYNC.enabled ? CLOUD_SYNC : null;

  const downloadBackup = () => {
    try {
      const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `franco-fit-backup-${todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    } catch {}
  };

  const doImport = () => {
    try {
      const next = JSON.parse(importText);
      if (!next || !Array.isArray(next.exercises) || typeof next.sessions !== "object") throw new Error("bad shape");
      if (!next.unit) next.unit = data.unit || "kg";
      restore(next);
      setImportMsg("Restored — all data replaced from the backup.");
      setImportText("");
    } catch {
      setImportMsg("That doesn't look like a valid backup. Nothing was changed.");
    }
  };
  const [newNames, setNewNames] = useState({});
  const [editing, setEditing] = useState(null);
  const [editText, setEditText] = useState("");

  const weekNum = Math.max(1, Math.floor((new Date(todayISO()) - new Date(data.cycleStart)) / (7 * 864e5)) + 1);

  const startNewCycle = () =>
    update((d) => {
      d.exercises.forEach((ex) => {
        const last = lastEntryFor(d, ex.id, null, null);
        if (last) {
          const top = Math.max(...last.entry.sets.map((s) => num(s.w)));
          ex.prev = isFinite(top) ? top : ex.prev;
        }
      });
      d.cycleNumber += 1;
      d.cycleName = `Cycle ${d.cycleNumber}`;
      d.cycleStart = todayISO();
    });

  return (
    <div>
      {seenToast && (
        <div className="ll-fade" style={{ position: "fixed", left: "50%", bottom: 84, transform: "translateX(-50%)", zIndex: 130, background: T.surface2, border: `1px solid ${T.pos}`, color: T.ink, borderRadius: 999, padding: "9px 16px", fontSize: 13, fontWeight: 600, boxShadow: "0 6px 20px rgba(0,0,0,0.35)" }}>
          {seenToast}
        </div>
      )}
      <div className="ll-display" style={{ fontSize: 26, fontWeight: 700, marginBottom: 12 }}>Manage</div>

      {/* Refeed day */}
      {data.refeedDay && (
        <div className="ll-card" style={{ padding: 14 }}>
          <div className="ll-display" style={{ fontSize: 18, fontWeight: 600, marginBottom: 4 }}>Refeed day</div>
          <div style={{ color: T.muted, fontSize: 12.5, marginBottom: 10 }}>
            The whole week rotates around it — heavy day right after, optional days 2nd and 5th, lightest day right before.
          </div>
          <Row style={{ gap: 5, flexWrap: "wrap" }}>
            {WEEK.map((w) => (
              <button key={w} className={`ll-chip ll-day ${data.refeedDay === w ? "on" : ""}`}
                style={data.refeedDay === w ? { borderColor: T.amber, color: T.amber } : {}}
                onClick={() => {
                  if (w === data.refeedDay) return;
                  update((d) => {
                    const oldR = WEEK.indexOf(d.refeedDay);
                    const newR = WEEK.indexOf(w);
                    d.exercises.forEach((ex) => {
                      const off = (WEEK.indexOf(ex.day) - oldR + 7) % 7;
                      ex.day = WEEK[(newR + off) % 7];
                    });
                    d.refeedDay = w;
                  });
                  applySchedule(w);
                }}>
                {w.slice(0, 3)}
              </button>
            ))}
          </Row>
        </div>
      )}

      {/* Style */}
      <div className="ll-card" style={{ padding: 14 }}>
        <div className="ll-display" style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Style</div>
        <div style={{ color: T.muted, fontSize: 12.5, marginBottom: 6 }}>Theme</div>
        <Row style={{ gap: 5, flexWrap: "wrap", marginBottom: 12 }}>
          {Object.entries(THEMES).map(([id, th]) => (
            <button key={id} className={`ll-chip ll-day ${(data.theme || "iron") === id ? "on" : ""}`}
              style={(data.theme || "iron") === id ? { borderColor: T.blue, color: T.blue } : {}}
              onClick={() => { update((d) => { d.theme = id; }); applyTheme(id); }}>
              {th.label}
            </button>
          ))}
        </Row>
        <div style={{ color: T.muted, fontSize: 12.5, marginBottom: 6 }}>Volume % on workout cards</div>
        <Row style={{ gap: 5, flexWrap: "wrap", marginBottom: 12 }}>
          {[["Show", false], ["Hide", true]].map(([lab, val]) => (
            <button key={lab} className={`ll-chip ll-day ${!!data.hideDeltas === val ? "on" : ""}`}
              style={!!data.hideDeltas === val ? { borderColor: T.blue, color: T.blue } : {}}
              onClick={() => update((d) => { d.hideDeltas = val; })}>
              {lab}
            </button>
          ))}
        </Row>
        <div style={{ color: T.muted, fontSize: 12.5, marginBottom: 6 }}>Win icon</div>
        <Row style={{ gap: 5, flexWrap: "wrap" }}>
          {REWARDS.map((r) => (
            <button key={r.id} className={`ll-chip ll-day ${rewardOf(data).id === r.id ? "on" : ""}`}
              style={{ color: r.color, fontSize: 15, ...(r.rainbow ? rainbowText() : {}), ...(rewardOf(data).id === r.id ? { borderColor: r.color, boxShadow: `0 0 8px ${r.color}59` } : {}) }}
              onClick={() => update((d) => { d.rewardId = r.id; })}>
              {r.char}
            </button>
          ))}
        </Row>
      </div>

      {/* Name */}
      <div className="ll-card" style={{ padding: 14 }}>
        <div className="ll-display" style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Name</div>
        <input className="ll-input" placeholder="Your name" value={data.userName || ""}
          onChange={(e) => update((d) => { d.userName = e.target.value; })} />
      </div>

      {/* Units */}
      <div className="ll-card" style={{ padding: 14 }}>
        <div className="ll-display" style={{ fontSize: 18, fontWeight: 600 }}>Units</div>
        <div style={{ color: T.muted, fontSize: 12.5, marginTop: 2, marginBottom: 10 }}>
          Label only — your logged numbers never convert.
        </div>
        {[["Lifting", "unit", "kg"], ["Bodyweight", "bwUnit", "lb"]].map(([lbl, key, def], ri) => (
          <Row key={key} style={{ justifyContent: "space-between", marginTop: ri ? 8 : 0 }}>
            <span style={{ color: T.muted, fontSize: 13.5 }}>{lbl}</span>
            <Row style={{ gap: 6 }}>
              {["kg", "lb"].map((u) => {
                const on = (data[key] || def) === u;
                return (

          <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${T.line}` }}>
            <div className="ll-display" style={{ fontSize: 15, fontWeight: 600, marginBottom: 4 }}>Cloud sync</div>

            <Row style={{ marginTop: 8 }}>
              <input className="ll-input" placeholder="Enter a sync code…" value={syncInput}
                onChange={(e) => setSyncInput(e.target.value)} />
              <button className="ll-btn ll-btn-sm ll-btn-chalk" onClick={async () => {
                const code = syncInput.trim();
                if (!code) return;
                setSyncMsg("Checking…");
                const val = await cloud.fetchById(code);
                if (val) {
                  cloud.adopt(code);
                  restore(val);
                  setSyncMsg("Connected — data pulled from the cloud.");
                  setSyncInput("");
                } else {
                  setSyncMsg("No data found for that code. Nothing was changed.");

              <div style={{ fontSize: 12.5, marginTop: 6, color: syncMsg.startsWith("Connected") ? T.pos : syncMsg === "Checking…" ? T.muted : T.neg }}>{syncMsg}</div>

          {confirmReset ? (
            <Row>

            </Row>
          ) : (
            <button className="ll-btn ll-btn-sm" style={{ color: T.neg }} onClick={() => setConfirmReset(true)}>Reset app</button>
          )}
        </div>
      </div>
    </div>
  );

/* ------------------------------------------------------------------ */
/* Rest timer — lives in the tab bar, styled apart from the text tabs  */
/* ------------------------------------------------------------------ */
const SASS = [
  "The machine misses you.",
  "That's not rest, that's a nap.",
  "The weights are getting cold.",
  "Scrolling isn't a set.",
  "Your muscles say they're ready.",
  "Rest complete. Excuses loading?",
];

function RestTimer() {
  const [startTs, setStartTs] = useState(null);
  const [, tick] = useState(0);
  useEffect(() => {
    if (!startTs) return;
    const iv = setInterval(() => tick((n) => n + 1), 500);
    return () => clearInterval(iv);
  }, [startTs]);

  const secs = startTs ? Math.floor((Date.now() - startTs) / 1000) : 0;
  const m = Math.floor(secs / 60);
  const s = String(secs % 60).padStart(2, "0");
  const warn = secs >= 75 && secs < 90;
  const long = secs >= 90;

  const sass = startTs && secs >= 180 ? SASS[Math.floor((secs - 180) / 15) % SASS.length] : null;
  return startTs ? (
    <Row style={{ gap: 8 }}>
      {sass && (
        <span style={{ fontSize: 10.5, fontStyle: "italic", color: T.neg, maxWidth: 150, textAlign: "right", lineHeight: 1.25 }}>{sass}</span>
      )}
      <div className={`ll-restpill on ${long ? "long" : warn ? "warn" : ""}`}>
        <button className="ll-restmain" onClick={() => setStartTs(Date.now())} aria-label="restart rest timer">
          {m}:{s}
        </button>
        <button className="ll-reststop" aria-label="stop rest timer" onClick={() => setStartTs(null)}>✕</button>
      </div>
    </Row>
  ) : (
    <button className="ll-restpill" onClick={() => setStartTs(Date.now())} aria-label="start rest timer">⏱ REST</button>
  );
}

/* ------------------------------------------------------------------ */
/* Sticky workout bar — elapsed time + rest timer, pinned while active */
/* ------------------------------------------------------------------ */
function WorkoutBar({ startedAt, pausedAt, pausedAccum, hidden, onToggleHide, onStop, onTogglePause, onSetStart }) {
  const [, tick] = useState(0);
  const [endArm, setEndArm] = useState(false);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState("");
  useEffect(() => {
    const iv = setInterval(() => tick((n) => n + 1), 1000);
    return () => clearInterval(iv);
  }, []);
  useEffect(() => {
    if (!endArm) return;
    const t = setTimeout(() => setEndArm(false), 3000);
    return () => clearTimeout(t);
  }, [endArm]);

  let label = null;
  if (startedAt) {
    const secs = Math.max(0, Math.floor(((pausedAt || Date.now()) - startedAt - (pausedAccum || 0)) / 1000));
    const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), sc = String(secs % 60).padStart(2, "0");
    label = h > 0 ? `${h}:${String(m).padStart(2, "0")}:${sc}` : `${m}:${sc}`;
  }

  const btnBase = { padding: 0, height: 27, minWidth: 34, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 8, cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 700 };

  const handleStop = () => {
    if (endArm) { setEndArm(false); onStop(); }
    else setEndArm(true);
  };

  const openEdit = () => { setDraft(to24(startedAt)); setEditing(true); };
  const commitStart = () => {
    const ts = clockToTs(startedAt, draft);
    if (ts != null && ts <= Date.now()) onSetStart(ts);
    setEditing(false);
  };

  return (
    <div className="ll-workbar">
      <Row style={{ gap: 8 }}>
        {(!hidden && label) ? (
          editing ? (
            <Row style={{ gap: 7 }}>
              <input type="time" autoFocus value={draft} onChange={(e) => setDraft(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") commitStart(); if (e.key === "Escape") setEditing(false); }}
                className="ll-input" style={{ width: 116, padding: "5px 7px", fontSize: 14 }} />
              <button className="ll-btn ll-btn-chalk" onClick={commitStart}>Set</button>
              <button className="ll-btn" aria-label="cancel edit" onClick={() => setEditing(false)}>✕</button>
            </Row>
          ) : (
            <button aria-label="edit start time" title="Edit start time" onClick={openEdit}
              style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", color: "inherit", padding: "6px 8px 6px 2px", marginRight: 8, display: "flex", alignItems: "center", gap: 7 }}>
              <span className="ll-num" style={{ fontSize: 16, fontWeight: 700, color: pausedAt ? T.faint : T.ink }}>{label}</span>
              <span style={{ fontSize: 13, color: T.faint }}>✎</span>
            </button>
          )
        ) : (
          <span style={{ fontSize: 11, letterSpacing: "0.1em", color: T.faint, textTransform: "uppercase" }}>
            Workout{pausedAt ? " · paused" : ""}
          </span>
        )}
        {!hidden && (
          <>
            <button aria-label={pausedAt ? "resume workout" : "pause workout"} onClick={onTogglePause}
              style={{ ...btnBase, background: T.surface2, border: `1px solid ${pausedAt ? T.blue : T.line}`, color: T.blue }}>
              {pausedAt ? "▶" : (
                <Row style={{ gap: 5 }}>
                  <span style={{ width: 3, height: 14, background: T.blue, borderRadius: 1, display: "block" }} />
                  <span style={{ width: 3, height: 14, background: T.blue, borderRadius: 1, display: "block" }} />
                </Row>
              )}
            </button>
            <button aria-label="stop workout" onClick={handleStop}
              style={{ ...btnBase, color: T.neg, border: `1px solid ${endArm ? T.neg : T.line}`, background: endArm ? "rgba(217,106,91,0.14)" : T.surface2 }}>
              {endArm ? "Stop?" : <span style={{ width: 14, height: 14, background: T.neg, borderRadius: 3, display: "block" }} />}
            </button>
          </>
        )}
      </Row>
      <Row style={{ gap: 8 }}>
        <button aria-label={hidden ? "show workout clock" : "hide workout clock"} onClick={onToggleHide}
          style={{ background: "none", border: "none", color: T.faint, fontSize: 11, cursor: "pointer", fontFamily: "inherit", padding: "6px 2px" }}>
          {hidden ? "show" : "hide"}
        </button>
        <RestTimer />
      </Row>
    </div>
  );
}

   conflicts. The row ids are the only secret; keep them out of logs. */
const MY_INBOX      = "ff-nb-a-9c2f1e7b4a8d6053";
const PARTNER_INBOX = "ff-nb-j-3e7d0a5c9b1f4826";
const MY_PUB        = "ff-pb-a-6b4c8e2f0d9a7135";
const PARTNER_PUB   = "ff-pb-j-1a5f9d3c7e0b8642";
const PARTNER_NAME  = "Jerold";

const CLOUD_SYNC = (() => {
  const enabled = SUPABASE_URL.startsWith("https://");
  const idKey = "franco-fit-a-v2:sync-id";
  const ensureId = () => {
    let id = null;
    try { id = localStorage.getItem(idKey); } catch {}
    if (!id) {
      id = Array.from(crypto.getRandomValues(new Uint8Array(16))).map((b) => b.toString(16).padStart(2, "0")).join("");
      try { localStorage.setItem(idKey, id); } catch {}
    }
    return id;
  };
  const headers = { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" };
  const fetchById = async (id) => {
    if (!enabled) return null;
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/logs?id=eq.${encodeURIComponent(id)}&select=value`, { headers });
      const rows = await r.json();
      return rows && rows[0] ? rows[0].value : null;
    } catch { return null; }
  };
  const pushTo = async (id, value) => {
    if (!enabled) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/logs`, {
        method: "POST",
        headers: { ...headers, Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify({ id, value, updated_at: new Date().toISOString() }),
      });
    } catch {}
  };
  const push = (value) => pushTo(ensureId(), value);
  const adopt = (id) => { try { localStorage.setItem(idKey, id); } catch {} };
  return { enabled, id: ensureId, fetchById, push, pushTo, adopt };
})();

const window_storage = {
  async get(k) {
    let v = null;
    try { v = localStorage.getItem(k); } catch {}
    if (v != null) return { key: k, value: v };
    if (CLOUD_SYNC.enabled) {
      const cloud = await CLOUD_SYNC.fetchById(CLOUD_SYNC.id());
      if (cloud) {
        const str = JSON.stringify(cloud);
        try { localStorage.setItem(k, str); } catch {}
        return { key: k, value: str };
      }
    }
    return null;
  },
  async set(k, v) {
    try { localStorage.setItem(k, v); } catch {}
    try { CLOUD_SYNC.push(JSON.parse(v)); } catch {}
    return { key: k, value: v };
  },
};

function freshSeed() {
  const d = buildSeed();
  d.sessions = {};
  d.cycleNumber = 1;
  d.cycleName = "Cycle 1";
  d.cycleStart = todayISO();
  d.unit = "lb";
  d.userName = "Alicia";
  d.nameAsked = true;
  d.refeedDay = "Saturday";
  d.rewardId = "pink-heart";
  return d;
}

const STORAGE_KEY = "franco-fit-a-v2";

/* Snapshot of my current schedule, published so my partner's note composer
   can highlight the days I actually train. */
function mySchedulePayload(data) {
  return {
    days: DAYS.slice(),
    optionalDays: { ...OPTIONAL_DAYS },
    cycleStart: data.cycleStart,
    cycleWeeks: data.cycleWeeks,
  };
}

/* The next `count` calendar dates (from today) that fall on a scheduled
   training day, given a published schedule payload. */
function upcomingWorkoutDates(schedule, count) {
  if (!schedule || !Array.isArray(schedule.days) || !schedule.days.length) return [];
  const set = new Set(schedule.days.map((d) => DAY_NUM[d]));
  const out = [];
  let iso = todayISO();
  for (let i = 0; i < 120 && out.length < count; i++) {
    if (set.has(new Date(iso + "T12:00:00").getDay())) out.push(iso);
    iso = addDays(iso, 1);
  }
  return out;
}

/* Downscale + re-encode a picked photo to a small JPEG data URI on-device, so
   an attached note stays small enough to sync and sit in storage. */
function compressImage(file, maxEdge, quality) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const scale = Math.min(1, maxEdge / Math.max(img.width, img.height));
      const w = Math.max(1, Math.round(img.width * scale));
      const h = Math.max(1, Math.round(img.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      try { resolve(canvas.toDataURL("image/jpeg", quality)); }
      catch (e) { reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("bad image")); };
    img.src = url;
  });
}

function App() {
  const [data, setData] = useState(null);
  const [inbox, setInbox] = useState([]);
  const [tab, setTab] = useState("today");
  const [day, setDay] = useState(defaultDay());
  const [saveState, setSaveState] = useState("saved");
  const [loadError, setLoadError] = useState(false);
  const [, discoTick] = useState(0);
  const tapRef = useRef({ n: 0, t: 0 });
  const timer = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await window_storage.get(STORAGE_KEY);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          if (!parsed.unit) parsed.unit = "kg";
          if (!parsed.cycleWeeks) parsed.cycleWeeks = 8;
          if (!parsed.cycleName) parsed.cycleName = `Cycle ${parsed.cycleNumber || 1}`;
          if (parsed.userName === undefined) { parsed.userName = ""; parsed.nameAsked = false; }
          if (REFEED_ROTATION && !parsed.refeedDay) parsed.refeedDay = "Saturday";
          if (!parsed.theme) parsed.theme = "iron";
          if (!parsed.rewardId) parsed.rewardId = "gold-star";
          if (!parsed.weights) parsed.weights = {};
          if (!parsed.bwUnit) parsed.bwUnit = "lb";
          if (!parsed.sentNotes) parsed.sentNotes = [];
          if (!parsed.noteAcks) parsed.noteAcks = {};
          applySchedule(parsed.refeedDay);
          applyTheme(parsed.theme);
          bootNotes(parsed);
          setData(parsed);
          return;
        }
        throw new Error("empty");
      } catch {
        const seed = freshSeed();
        applySchedule(seed.refeedDay);
        applyTheme(seed.theme);
        bootNotes(seed);
        setData(seed);
        try { await window_storage.set(STORAGE_KEY, JSON.stringify(seed)); }
        catch { setLoadError(true); }
      }
    })();
  }, []);

  /* Publish my schedule + read-receipts, and pull any notes waiting for me. */
  const bootNotes = (d) => {
    if (!CLOUD_SYNC.enabled) return;
    CLOUD_SYNC.pushTo(MY_PUB, { schedule: mySchedulePayload(d), acks: d.noteAcks || {}, name: d.userName || "" });
    CLOUD_SYNC.fetchById(MY_INBOX).then((box) => { if (box && Array.isArray(box.notes)) setInbox(box.notes); });
  };

  const refreshInbox = async () => {
    if (!CLOUD_SYNC.enabled) return inbox;
    const box = await CLOUD_SYNC.fetchById(MY_INBOX);
    if (box && Array.isArray(box.notes)) { setInbox(box.notes); return box.notes; }
    return inbox;
  };

  /* Recipient marks a note delivered (= seen): store locally and republish my
     pub row so the sender gets a read receipt. */
  const deliverNote = (noteId) => {
    update((d) => {
      if (!d.noteAcks) d.noteAcks = {};
      d.noteAcks[noteId] = new Date().toISOString();
      if (CLOUD_SYNC.enabled) CLOUD_SYNC.pushTo(MY_PUB, { schedule: mySchedulePayload(d), acks: d.noteAcks, name: d.userName || "" });
    });
  };

  const scheduleSave = (next) => {
    setSaveState("saving");
    if (timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(async () => {
      try {
        await window_storage.set(STORAGE_KEY, JSON.stringify(next));
        setSaveState("saved");
      } catch {
        setSaveState("error");
      }
    }, 800);
  };

  const update = (fn) => {
    setData((prev) => {
      const next = structuredClone(prev);
      fn(next);
      scheduleSave(next);
      return next;
    });
  };

  const reseed = () => {
    const seed = freshSeed();
    applySchedule(seed.refeedDay);
    applyTheme(seed.theme);
    setData(seed);
    scheduleSave(seed);
  };

  const onLogoTap = () => {
    const now = Date.now();
    if (now - tapRef.current.t > 1500) tapRef.current.n = 0;
    tapRef.current.t = now;
    tapRef.current.n += 1;
    if (tapRef.current.n < 5) return;
    tapRef.current.n = 0;
    const ids = Object.keys(THEMES);
    let i = 0;
    const iv = setInterval(() => {
      applyTheme(ids[i % ids.length]);
      discoTick((x) => x + 1);
      i += 1;
      if (i > ids.length * 2) {
        clearInterval(iv);
        applyTheme((data && data.theme) || "iron");
        discoTick((x) => x + 1);
      }
    }, 110);
  };

  if (!data) {
    return (
      <div className="ll-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
        <style>{buildCSS()}</style>
        <span className="ll-display" style={{ color: T.muted, fontSize: 18, letterSpacing: "0.15em" }}>LOADING…</span>
      </div>
    );
  }

  return (
    <div className="ll-root">
      <style>{buildCSS()}</style>
      <div className="ll-shell">
        <Row style={{ justifyContent: "space-between", padding: "18px 0 14px" }}>
          <Row style={{ gap: 10, alignItems: "baseline" }}>
            <span className="ll-display" onClick={onLogoTap} style={{ fontSize: 17, fontWeight: 700, letterSpacing: "0.18em", cursor: "pointer", userSelect: "none" }}>FRANCO FIT</span>
            <span className="ll-num" style={{ color: T.faint, fontSize: 12 }}>
              {new Date().toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}
            </span>
          </Row>
          <span style={{ fontSize: 11.5, color: saveState === "error" ? T.neg : T.faint }} className="ll-num">
            {saveState === "saving" ? "saving…" : saveState === "error" ? "save failed" : "saved"}
          </span>
        </Row>
        {loadError && <div className="ll-note" style={{ marginBottom: 10 }}>This browser is blocking storage — logs won't persist. Avoid private/incognito mode.</div>}
        {tab === "today" && <TodayView data={data} update={update} day={day} setDay={setDay} notes={inbox} refreshInbox={refreshInbox} deliverNote={deliverNote} />}
        {tab === "progress" && (
          <ProgressView data={data} update={update} day={day} setDay={setDay}
            onGoToday={(d) => { setDay(d); setTab("today"); }} />
        )}
        {tab === "manage" && <ManageView data={data} update={update} reseed={reseed} restore={(next) => { applySchedule(next.refeedDay); applyTheme(next.theme || "iron"); setData(next); scheduleSave(next); }} />}
      </div>
      <nav className="ll-tabbar">
        {[["today", "Log"], ["progress", "Progress"], ["manage", "Manage"]].map(([id, label]) => (
          <button key={id} className={`ll-tab ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}>
            {label}
            <div className="ll-tabline" />
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
