  if (!REFEED_ROTATION || !refeedDay) return;
  const r = WEEK.indexOf(refeedDay);

    .sort((a, b) => ((DAY_NUM[a] + 6) % 7) - ((DAY_NUM[b] + 6) % 7));

const parseSets = (s) =>
  s && s.trim()
    ? s.trim().split(/\s+/).map((t) => {
        const [w, r] = t.split("x");
        return { w: parseFloat(w), r: parseInt(r, 10) || 0 };
      })
    : [];

const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, "-");

function buildSeed() {
  const data = {
    version: 1,
    unit: "kg",
    userName: "",
    nameAsked: false,
    theme: "iron",
    rewardId: "gold-star",
    weights: {},
    bwUnit: "lb",
    sentNotes: [],
    noteAcks: {},
    cycleNumber: 2,
    cycleName: "Cycle 2",
    cycleWeeks: 8,
    cycleStart: "2026-06-15",
    exercises: [],
    sessions: {},
  };
  for (const day of DAYS) {
    RAW[day].ex.forEach(([name, prev, weeks, setsOverride, repGoal], i) => {
      const id = slug(`${day}-${i}-${name}`);
      const targetSets = setsOverride || Math.max(1, ...weeks.map((w) => parseSets(w).length));
      data.exercises.push({
        id,
        day,
        name,
        prev,
        targetSets,
        repGoal: repGoal || null,
        variants: [{ id: "main", name: "Usual machine" }],
        activeVariant: "main",
      });
      weeks.forEach((str, wi) => {
        const sets = parseSets(str);
        const date = RAW[day].dates[wi];
        if (!sets.length || !date) return;
        const key = `${date}|${day}`;
        if (!data.sessions[key]) data.sessions[key] = { date, day, entries: {} };
        data.sessions[key].entries[id] = { variantId: "main", sets, note: "", swapName: "" };
      });
    });
  }
  return data;
}

const todayISO = () => {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
};
const fmtDate = (iso) =>
  new Date(iso + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const fmtClock = (ts) =>
  ts ? new Date(ts).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }) : "";
const clockToTs = (baseTs, hhmm) => {
  const m = /^(\d{1,2}):(\d{2})$/.exec(hhmm || "");
  if (!m) return null;
  const h = parseInt(m[1], 10), min = parseInt(m[2], 10);
  if (h < 0 || h > 23 || min < 0 || min > 59) return null;
  const d = new Date(baseTs);
  d.setHours(h, min, 0, 0);
  return d.getTime();
};
const to24 = (ts) => {
  const d = new Date(ts);
  const p = (n) => String(n).padStart(2, "0");
  return `${p(d.getHours())}:${p(d.getMinutes())}`;
};
const toDateStr = (ts) => {
  const d = new Date(ts);
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
};
const dtToTs = (dateStr, hhmm) => {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr || "")) return null;
  const base = new Date(dateStr + "T12:00:00");
  if (isNaN(base.getTime())) return null;
  return clockToTs(base.getTime(), hhmm);
};
const num = (v) => {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
};
const volumeOf = (sets) => sets.reduce((a, s) => a + (s.skipped ? 0 : num(s.w) * num(s.r)), 0);
const repsOf = (sets) => sets.reduce((a, s) => a + (s.skipped ? 0 : num(s.r)), 0);
const isBodyweight = (sets) => volumeOf(sets) === 0 && repsOf(sets) > 0;
const scoreOf = (sets) => { const v = volumeOf(sets); return v > 0 ? v : repsOf(sets); };
const fmtVol = (n) => Math.round(n).toLocaleString("en-US");
const setsLine = (sets) =>

    .join("  ");
const entryHasData = (e) => e && e.sets && e.sets.some((s) => !s.skipped && (num(s.r) > 0 || num(s.w) > 0));

function defaultDay() {
  const jd = new Date().getDay();
  const exact = DAYS.find((d) => DAY_NUM[d] === jd);
  if (exact) return exact;
  let best = DAYS[0], bestGap = 8;
  for (const d of DAYS) {
    const gap = (DAY_NUM[d] - jd + 7) % 7;
    if (gap < bestGap) { bestGap = gap; best = d; }
  }
  return best;
}

const addDays = (iso, n) => {
  const d = new Date(iso + "T12:00:00");
  d.setDate(d.getDate() + n);
  const p = (x) => String(x).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
};
const weekOfCycle = (data, iso) =>
  Math.floor((new Date(iso + "T12:00:00") - new Date(data.cycleStart + "T12:00:00")) / (7 * 864e5));
function cellDateFor(cycleStart, w, day) {
  for (let i = 0; i < 7; i++) {
    const iso = addDays(cycleStart, w * 7 + i);
    if (new Date(iso + "T12:00:00").getDay() === DAY_NUM[day]) return iso;
  }
  return cycleStart;
}
const dayVolume = (sess) =>
  Object.values(sess.entries).reduce((a, e) => a + (entryHasData(e) ? scoreOf(e.sets) : 0), 0);
function daySessionIn(data, day, w) {
  return sortedSessions(data).find(
    (s) => s.day === day && weekOfCycle(data, s.date) === w && Object.values(s.entries).some(entryHasData)
  );
}

/* Most recent session containing this exercise (optionally same variant), excluding a key */
function lastEntryFor(data, exId, variantId, excludeKey, beforeDate) {
  const list = sortedSessions(data);
  for (let i = list.length - 1; i >= 0; i--) {
    const s = list[i];
    if (s.key === excludeKey) continue;
    if (beforeDate && s.date >= beforeDate) continue;
    const e = s.entries[exId];
    if (!entryHasData(e)) continue;
    if (variantId && e.variantId !== variantId) continue;
    return { date: s.date, entry: e };
  }
  return null;
}

/* All sessions for an exercise, ascending */
function historyFor(data, exId) {
  return sortedSessions(data)
    .filter((s) => entryHasData(s.entries[exId]))
    .map((s) => ({ key: s.key, date: s.date, entry: s.entries[exId] }));
}

function pct(from, to) {
  if (!from) return null;
  return ((to - from) / from) * 100;
}

/* ------------------------------------------------------------------ */
/* Sheet export — mirrors the original Google Sheet layout             */
/* ------------------------------------------------------------------ */
function buildSheetRows(data) {
  const start = new Date(data.cycleStart + "T12:00:00");
  const weekOf = (iso) => Math.floor((new Date(iso + "T12:00:00") - start) / (7 * 864e5));
  const sessions = sortedSessions(data);
  let maxWeek = 0;
  sessions.forEach((s) => {
    const w = weekOf(s.date);
    if (w >= 0 && w > maxWeek) maxWeek = w;
  });
  const weeks = maxWeek + 1;
  const SETS = 6;

  const rows = [];
  const h1 = ["", "Prev"];
  const h2 = ["", ""];
  for (let w = 0; w < weeks; w++) {
    for (let i = 0; i < SETS; i++) {
      h1.push(i === 0 ? `Week ${w + 1}` : "");
      h2.push(String(i + 1));
    }
  }
  rows.push(h1, h2);

  const extras = [];
  for (const day of DAYS) {
    rows.push([day]);
    for (const ex of data.exercises.filter((e) => e.day === day)) {
      const r = [ex.name, ex.prev ?? ""];
      for (let w = 0; w < weeks; w++) {
        const sess = sessions.find(
          (s) => s.day === day && weekOf(s.date) === w && entryHasData(s.entries[ex.id])
        );
        const cells = Array(SETS).fill("");
        if (sess) {
          const e = sess.entries[ex.id];
          const logged = e.sets.filter((x) => num(x.r) > 0 || num(x.w) > 0);
          logged.forEach((x, i) => {
            const cell = `${x.w}x${x.r}${x.tag ? ` (${x.tag})` : ""}`;
            if (i < SETS) cells[i] = cell;
            else cells[SETS - 1] += ` + ${cell}`;
          });
          const vName = (ex.variants.find((v) => v.id === e.variantId) || {}).name || "";
          if ((e.note && e.note.trim()) || (vName && vName !== "Usual machine") || e.swapName) {
            extras.push([
              sess.date, day, ex.name,
              e.swapName ? `did ${e.swapName}` : "",
              vName !== "Usual machine" ? vName : "",
              e.note || "",
            ]);
          }
        }
        r.push(...cells);
      }
      rows.push(r);
    }
  }

  sessions.forEach((s) => {
    if ((s.dayNote || "").trim()) extras.push([s.date, s.day, "— whole day —", "", "", s.dayNote]);
  });

  if (extras.length) {
    rows.push([], ["Machines, swaps & notes"], ["Date", "Day", "Exercise", "Swap", "Machine", "Note"]);
    extras.forEach((n) => rows.push(n));
  }
  return rows;
}

const toCSV = (rows) =>
  rows.map((r) => r.map((v) => {
    const s = String(v ?? "");
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }).join(",")).join("\n");

const toTSV = (rows) =>
  rows.map((r) => r.map((v) => String(v ?? "").replace(/[\t\n]/g, " ")).join("\t")).join("\n");

/* ------------------------------------------------------------------ */
/* Small UI pieces                                                     */
/* ------------------------------------------------------------------ */
const Row = ({ children, style }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 8, ...style }}>{children}</div>
);

const Delta = ({ value, suffix = "%" }) => {
  if (value === null || value === undefined || !isFinite(value))
    return <span style={{ color: T.faint, fontSize: 13 }}>—</span>;
  const up = value >= 0;
  return (
    <span className="ll-num" style={{ color: up ? T.pos : T.neg, fontSize: 13, fontWeight: 700 }}>
      {up ? "▲" : "▼"} {Math.abs(value).toFixed(1)}{suffix}
    </span>
  );
};

const PlateBar = ({ frac, color }) => (
  <div
    className="ll-platebar"
    style={{
      width: `${Math.max(3, frac * 100)}%`,
      backgroundColor: color,
      backgroundImage: `repeating-linear-gradient(90deg, rgba(0,0,0,0.28) 0 2px, transparent 2px 12px)`,
    }}
  />
);

const VariantDot = ({ index }) => {
  const palette = ["#9BA0A9", "#E3A93C", "#5480C8", "#CE5148", "#5AA35F", "#B08BD0"];
  return (
    <span style={{ width: 8, height: 8, borderRadius: 4, background: palette[index % palette.length], display: "inline-block", flex: "none" }} />
  );
};

/* This week's status for a given training day */
function dayWeekStatus(data, d, wArg) {
  const today = todayISO();
  const w = wArg !== undefined ? wArg : Math.max(0, weekOfCycle(data, today));
  const sess = daySessionIn(data, d, w);
  if (sess) {
    const finished = sess.celebrated || sess.date < today;
    if (!finished) return "logged";
    let prev = null;
    for (let i = w - 1; i >= 0; i--) { const p = daySessionIn(data, d, i); if (p) { prev = p; break; } }
    const dv = dayVolume(sess);
    const pv = prev ? dayVolume(prev) : null;
    return pv !== null && dv > pv ? "star" : pv !== null && dv < pv ? "down" : "logged";
  }
  const dateIso = cellDateFor(data.cycleStart, w, d);
  if (dateIso === today) return "today";
  if (dateIso < today) return OPTIONAL_DAYS[d] ? "optional" : "missed";
  return "future";
}

function DayStatusIcon({ status, size = 8, data }) {
  if (status === "star") return <RewardGlyph data={data} size={size + 5} />;
  if (status === "missed") return <span style={{ color: T.faint, fontSize: size + 2, lineHeight: 1, flex: "none" }}>✕</span>;
  const st = { width: size, height: size, borderRadius: size, flex: "none", display: "inline-block" };
  if (status === "down") return <span style={{ ...st, background: T.neg }} />;
  if (status === "logged") return <span style={{ ...st, background: T.pos }} />;
  if (status === "today") return <span style={{ ...st, border: `2px solid ${T.blue}` }} />;
  if (status === "optional") return <span style={{ ...st, border: `1.5px dashed ${T.faint}`, opacity: 0.8 }} />;
  return <span style={{ ...st, border: `1.5px solid ${T.line}`, opacity: 0.6 }} />;
}

/* ------------------------------------------------------------------ */
/* Set editor row                                                      */
/* ------------------------------------------------------------------ */
const SET_TAGS = ["drop set", "partials", "rest-pause", "burnout"];

function SetRow({ idx, set, compareSet, unit, repGoal, onChange, onRemove }) {
  const w = num(set.w), r = num(set.r);
  let repsCls = "";
  let target = null;
  if (compareSet) {
    const lw = num(compareSet.w), lr = num(compareSet.r);
    const lastScore = lw > 0 ? lw * lr : lr;
    /* reps needed at today's weight to beat last week's set */
    if (w > 0) target = Math.floor((lw * lr) / w) + 1;
    else if (lw === 0) target = lr + 1;
    if (r > 0) {
      const todayScore = lw === 0 && w === 0 ? r : w * r;
      repsCls = todayScore > lastScore ? "good" : todayScore < lastScore ? "bad" : "";
    }
  }
  const dim = set.skipped ? { opacity: 0.4, pointerEvents: "none" } : {};
  return (
    <div style={{ marginBottom: set.extra ? 4 : 8 }}>
      <Row>
        <span className="ll-num" style={{ color: set.skipped ? T.faint : set.extra ? T.amber : T.faint, width: 18, fontSize: 13, flex: "none" }}>
          {set.skipped ? "–" : set.extra ? "+" : idx + 1}
        </span>
        <input className="ll-input ll-setnum" style={{ width: 78, ...dim }} inputMode="decimal" value={set.w} aria-label="weight" placeholder={unit || "kg"} disabled={!!set.skipped}
          onChange={(e) => onChange({ ...set, w: e.target.value })} />
        <span style={{ color: T.faint, fontSize: 13 }}>×</span>
        <button className="ll-step" style={dim} disabled={!!set.skipped} aria-label="minus 1 rep"
          onClick={() => onChange({ ...set, r: num(set.r) > 0 ? num(set.r) - 1 : Math.max(0, (target || repGoal || 1) - 1) })}>−</button>
        <input className={`ll-input ll-setnum ll-reps ${repsCls}`} style={dim} inputMode="numeric" value={set.r} aria-label="reps" disabled={!!set.skipped}
          placeholder={target ? `${target}+` : repGoal ? String(repGoal) : "reps"}
          onChange={(e) => onChange({ ...set, r: e.target.value })} />
        <button className="ll-step" style={dim} disabled={!!set.skipped} aria-label="plus 1 rep"
          onClick={() => onChange({ ...set, r: num(set.r) > 0 ? num(set.r) + 1 : (target || repGoal || 1) })}>+</button>
        <button onClick={() => onChange({ ...set, w: "", r: "", tag: "", skipped: false, skipNote: "" })} aria-label="clear set" title="clear set"
          style={{ background: "none", border: "none", color: T.muted, fontSize: 16, cursor: "pointer", padding: "0 3px" }}>⌫</button>
        {set.extra ? (
          <button onClick={onRemove} aria-label="remove set" title="delete set"
            style={{ background: "none", border: "none", color: T.faint, fontSize: 17, cursor: "pointer", padding: "0 2px" }}>✕</button>
        ) : (
          <button onClick={() => onChange({ ...set, skipped: !set.skipped })} aria-label={set.skipped ? "unskip set" : "skip set"}
            style={{ background: "none", border: "none", color: set.skipped ? T.amber : T.faint, fontSize: 11.5, cursor: "pointer", padding: "0 2px", fontFamily: "inherit", fontWeight: 600 }}>
            {set.skipped ? "undo" : "skip"}
          </button>
        )}
      </Row>
      {!set.extra && set.skipped && (
        <input className="ll-input" style={{ margin: "5px 0 8px 26px", width: "calc(100% - 26px)", fontSize: 13 }}
          placeholder="Why skip? (machine taken, out of gas…)" value={set.skipNote || ""}
          onChange={(e) => onChange({ ...set, skipNote: e.target.value })} />
      )}
      {set.extra && (
        <Row style={{ gap: 5, margin: "5px 0 8px 26px", flexWrap: "wrap" }}>
          {SET_TAGS.map((t) => (
            <button key={t} className={`ll-tagchip ${set.tag === t ? "on" : ""}`}
              onClick={() => onChange({ ...set, tag: set.tag === t ? "" : t })}>
              {t}
            </button>
          ))}
        </Row>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Exercise card (Today view)                                          */
/* ------------------------------------------------------------------ */
function ExerciseCard({ data, update, ex, sessionKey, dayColor }) {
  const [open, setOpen] = useState(false);
  const [addingMachine, setAddingMachine] = useState(false);
  const [machineName, setMachineName] = useState("");
  const [swapping, setSwapping] = useState(false);
  const [swapText, setSwapText] = useState("");
  const [removeArm, setRemoveArm] = useState(null);

  const session = data.sessions[sessionKey];
  const sessionDate = sessionKey.split("|")[0];
  const entry = session && session.entries[ex.id];
  const variantId = entry ? entry.variantId : ex.activeVariant;
  const variant = ex.variants.find((v) => v.id === variantId) || ex.variants[0];

  const lastSame = lastEntryFor(data, ex.id, variantId, sessionKey, sessionDate);
  const lastAny = lastEntryFor(data, ex.id, null, sessionKey, sessionDate);

  const ensureEntry = (d) => {
    if (!d.sessions[sessionKey]) {
      d.sessions[sessionKey] = { date: sessionKey.split("|")[0], day: ex.day, entries: {} };
    }
    if (!d.sessions[sessionKey].entries[ex.id]) {
      d.sessions[sessionKey].entries[ex.id] = {
        variantId: ex.activeVariant,
        sets: Array.from({ length: ex.targetSets || 3 }, () => ({ w: "", r: "", extra: false, tag: "" })),
        note: "",
        swapName: "",
      };
    }
    return d.sessions[sessionKey].entries[ex.id];
  };

  /* Baked-in sets: opening the card lays out (and heals) the planned set count */
  useEffect(() => {
    if (!open) return;
    update((d) => {
      const e = ensureEntry(d);
      const nonExtra = e.sets.filter((s) => !s.extra);
      const extras = e.sets.filter((s) => s.extra);
      while (nonExtra.length < (ex.targetSets || 3)) nonExtra.push({ w: "", r: "", extra: false, tag: "" });
      e.sets = [...nonExtra, ...extras];
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [open]);

  const changeSet = (i, ns) =>
    update((d) => {
      const e = ensureEntry(d);
      const oldW = String(e.sets[i].w ?? "");
      e.sets[i] = ns;
      /* Cascade weight down to blank/matching sets — but never cascade a clear */
      const newW = String(ns.w ?? "");
      if (newW !== oldW && newW !== "") {
        for (let j = i + 1; j < e.sets.length; j++) {
          const wj = String(e.sets[j].w ?? "");
          if (wj === "" || wj === oldW) e.sets[j] = { ...e.sets[j], w: ns.w };
        }
      }
    });

  const addExtraSet = () =>
    update((d) => {
      const e = ensureEntry(d);
      const lastWeighted = [...e.sets].reverse().find((s) => num(s.w) > 0);
      e.sets.push({ w: lastWeighted ? lastWeighted.w : "", r: "", extra: true, tag: "" });
    });

  const todaySets = entry ? entry.sets : [];
  const skippedAll = !!(entry && entry.skippedAll);
  const hasLogged = !skippedAll && todaySets.some((s) => !s.skipped && (num(s.r) > 0 || num(s.w) > 0));
  const plannedToday = todaySets.filter((s) => !s.extra);
  const exTotal = Math.max(plannedToday.length, ex.targetSets || 3);
  const plannedFilled = plannedToday.filter((s) => num(s.r) > 0 || s.skipped).length;
  const extraFilled = todaySets.filter((s) => s.extra && num(s.r) > 0).length;
  const exFilled = skippedAll ? exTotal : plannedFilled + extraFilled;
  const exComplete = skippedAll || plannedFilled >= exTotal;
  const todayVol = scoreOf(todaySets);
  const lastVol = lastSame ? scoreOf(lastSame.entry.sets) : 0;
  const liveDelta = exComplete && !skippedAll && lastSame ? pct(lastVol, todayVol) : null;
  const beating = exComplete && liveDelta !== null && liveDelta > 0;
  const stripColor = !exComplete
    ? T.line
    : skippedAll ? "#565B63" : beating ? T.pos : liveDelta !== null && liveDelta < 0 ? T.neg : T.amber;

  const [burst, setBurst] = useState(null);
  const prevCompleteRef = useRef(exComplete);
  useEffect(() => {
    if (!prevCompleteRef.current && exComplete && !skippedAll && beating) {
      setBurst(Array.from({ length: 9 }, () => ({
        mx: 18 + Math.random() * 80,
        my: -(16 + Math.random() * 48),
        mr: 180 + Math.random() * 420,
      })));
      setTimeout(() => setBurst(null), 900);
    }
    prevCompleteRef.current = exComplete;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [exComplete]);

  const bodyweight = lastSame && isBodyweight(lastSame.entry.sets);

  return (
    <div className="ll-card" style={{ position: "relative" }}>
      {burst && burst.map((p, i) => (
        <span key={i} className="ll-mini" style={{
          background: i % 3 === 0 ? rewardOf(data).color : i % 3 === 1 ? T.pos : "#EDEEE9",
          "--mx": `${p.mx}px`, "--my": `${p.my}px`, "--mr": `${p.mr}deg`,
        }} />
      ))}
      {/* header */}
      <div onClick={() => setOpen(!open)} style={{ padding: "13px 14px", cursor: "pointer" }}>
        <Row style={{ justifyContent: "space-between" }}>
          <Row style={{ gap: 9, minWidth: 0 }}>
            <span style={{ width: 4, alignSelf: "stretch", minHeight: 20, borderRadius: 2, background: stripColor, flex: "none", boxShadow: beating ? "0 0 8px rgba(105,181,109,0.7)" : "none", transition: "background-color 0.5s ease, box-shadow 0.5s ease" }} />
            <div style={{ minWidth: 0 }}>
              <div className="ll-display" style={{ fontSize: 18, fontWeight: 600 }}>
                {ex.icon ? <span style={{ marginRight: 7 }}>{ex.icon}</span> : null}
                {entry && entry.swapName ? entry.swapName : ex.name}
                {entry && entry.swapName ? (
                  <span style={{ color: T.amber, fontSize: 12, marginLeft: 8, fontFamily: "Barlow" }}>swapped</span>
                ) : null}
              </div>
              <div style={{ color: T.muted, fontSize: 12.5, marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {ex.variants.length > 1 ? `${variant.name} · ` : ""}
                {lastSame ? `last ${fmtDate(lastSame.date)}: ${setsLine(lastSame.entry.sets)}` : "no history on this machine"}
              </div>
            </div>
          </Row>
          <Row style={{ gap: 8, flex: "none" }}>
            {exTotal > 0 && (
              <Row style={{ gap: 3, flex: "none" }} aria-label={`${exFilled} of ${exTotal} sets done`}>
                {Array.from({ length: exTotal }, (_, i) => {
                  const s2 = plannedToday[i];
                  const fill = skippedAll ? "#565B63" : s2 && num(s2.r) > 0 ? T.pos : s2 && s2.skipped ? "#565B63" : null;
                  return (
                    <span key={i} className={fill ? "ll-boxin" : ""} style={{ width: 9, height: 9, borderRadius: 2, flex: "none", background: fill || "transparent", border: fill ? "none" : `1px solid ${T.line}`, animationDelay: `${i * 45}ms` }} />
                  );
                })}
                {todaySets.filter((s2) => s2.extra && num(s2.r) > 0).map((s2, i) => (
                  <span key={"x" + i} style={{ width: 9, height: 9, borderRadius: 2, flex: "none", background: T.amber }} />
                ))}
              </Row>
            )}
            {!data.hideDeltas && exComplete && liveDelta !== null && <Delta value={liveDelta} />}
            {lastSame && lastSame.entry.note && <span title="note last time" style={{ color: T.amber, fontSize: 14 }}>●</span>}
            <span style={{ color: T.faint, fontSize: 13 }}>{open ? "▾" : "▸"}</span>
          </Row>
        </Row>
      </div>

      {open && (
        <div className="ll-fade" style={{ padding: "0 14px 14px", borderTop: `1px solid ${T.line}` }}>
          {/* last time */}
          <div style={{ background: T.bg, border: `1px solid ${T.line}`, borderRadius: 10, padding: "10px 12px", margin: "12px 0 10px" }}>
            {lastSame ? (
              <>
                <Row style={{ justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ color: T.muted, fontSize: 12.5, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                    Last time · {fmtDate(lastSame.date)}
                  </span>
                  <span className="ll-num" style={{ color: T.muted, fontSize: 12.5 }}>
                    {bodyweight ? `${repsOf(lastSame.entry.sets)} reps` : `vol ${fmtVol(lastVol)}`}
                  </span>
                </Row>
                <div className="ll-num" style={{ fontSize: 15.5, lineHeight: 1.5 }}>{setsLine(lastSame.entry.sets)}</div>
                {lastSame.entry.sets.some((s) => s.skipped && s.skipNote) && (
                  <div style={{ color: T.faint, fontSize: 12, marginTop: 4 }}>
                    {lastSame.entry.sets
                      .map((s, i) => (s.skipped && s.skipNote ? `set ${i + 1} skipped: ${s.skipNote}` : null))
                      .filter(Boolean)
                      .join(" · ")}
                  </div>
                )}
                {lastSame.entry.note ? <div className="ll-note" style={{ marginTop: 8 }}>“{lastSame.entry.note}”</div> : null}
              </>
            ) : (
              <>
                <div style={{ color: T.muted, fontSize: 13.5 }}>First time on <b style={{ color: T.ink }}>{variant.name}</b>.</div>
                {lastAny && (
                  <div style={{ color: T.faint, fontSize: 12.5, marginTop: 4 }}>
                    Other machine, {fmtDate(lastAny.date)}: <span className="ll-num">{setsLine(lastAny.entry.sets)}</span>
                  </div>
                )}
              </>
            )}
          </div>

          {/* machine selector */}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
            {ex.variants.map((v, i) => (
              <button key={v.id} className={`ll-chip ${v.id === variantId ? "on" : ""}`}
                onClick={() =>
                  update((d) => {
                    const dex = d.exercises.find((x) => x.id === ex.id);
                    dex.activeVariant = v.id;
                    const s = d.sessions[sessionKey];
                    if (s && s.entries[ex.id]) s.entries[ex.id].variantId = v.id;
                  })
                }>
                <VariantDot index={i} /> {v.name}
                {v.id !== "main" && (
                  <span aria-label={`remove ${v.name}`}
                    onClick={(e) => {
                      e.stopPropagation();
                      if (removeArm !== v.id) { setRemoveArm(v.id); setTimeout(() => setRemoveArm(null), 3000); return; }
                      update((d) => {
                        const dex = d.exercises.find((x) => x.id === ex.id);
                        dex.variants = dex.variants.filter((vv) => vv.id !== v.id);
                        if (dex.activeVariant === v.id) dex.activeVariant = "main";
                        const sN = d.sessions[sessionKey];
                        if (sN && sN.entries[ex.id] && sN.entries[ex.id].variantId === v.id) sN.entries[ex.id].variantId = "main";
                      });
                      setRemoveArm(null);
                    }}
                    style={{ color: removeArm === v.id ? T.neg : T.faint, fontWeight: 700, marginLeft: 3, padding: "0 2px", fontSize: 12 }}>
                    {removeArm === v.id ? "✕?" : "✕"}
                  </span>
                )}
              </button>
            ))}
            {addingMachine ? (
              <Row style={{ width: "100%" }}>
                <input className="ll-input" autoFocus placeholder="Machine name (e.g. plate-loaded)" value={machineName}
                  onChange={(e) => setMachineName(e.target.value)} />
                <button className="ll-btn ll-btn-sm ll-btn-chalk" onClick={() => {
                  const name = machineName.trim();
                  if (!name) return;
                  update((d) => {
                    const dex = d.exercises.find((x) => x.id === ex.id);
                    const vid = slug(name) + "-" + dex.variants.length;
                    dex.variants.push({ id: vid, name });
                    dex.activeVariant = vid;
                    const s = d.sessions[sessionKey];
                    if (s && s.entries[ex.id]) s.entries[ex.id].variantId = vid;
                  });
                  setMachineName(""); setAddingMachine(false);
                }}>Add</button>
              </Row>
            ) : (
              <button className="ll-chip" onClick={() => setAddingMachine(true)}>+ machine</button>
            )}
          </div>


          {/* today's sets */}
          {skippedAll ? (
            <div style={{ margin: "2px 0 10px" }}>
              <div className="ll-note" style={{ background: "rgba(86,91,100,0.16)", borderColor: T.line, color: T.muted }}>
                Skipped today — add a reason in the note below if you want.
              </div>
              <button className="ll-btn ll-btn-sm" style={{ marginTop: 8 }}
                onClick={() => update((d) => { ensureEntry(d).skippedAll = false; })}>
                Undo — do this exercise
              </button>
            </div>
          ) : (
            <>
              {todaySets.length > 0 && (
                <Row style={{ justifyContent: "center", gap: 6, margin: "2px 0 8px", fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: T.faint }}>
                  <span>weight ({data.unit || "kg"})</span><span>×</span><span style={{ color: T.amber }}>reps</span>
                </Row>
              )}
              {(() => {
                const lastLogged = lastSame
                  ? lastSame.entry.sets.filter((x) => num(x.r) > 0 || num(x.w) > 0)
                  : [];
                return todaySets.map((s, i) => (
                  <SetRow key={i} idx={i} set={s} unit={data.unit} repGoal={ex.repGoal}
                    compareSet={!s.extra ? lastLogged[i] : undefined}
                    onChange={(ns) => changeSet(i, ns)}
                    onRemove={() => update((d) => { ensureEntry(d).sets.splice(i, 1); })} />
                ));
              })()}

              <Row style={{ marginTop: 4, marginBottom: 10 }}>
                <button className="ll-btn" style={{ flex: 1 }} onClick={addExtraSet}>+ Extra set</button>
                <button className="ll-btn" style={{ flex: 1, color: T.muted }}
                  onClick={() => update((d) => { ensureEntry(d).skippedAll = true; })}>
                  Skip all sets
                </button>
              </Row>

              {exComplete && (
                <Row style={{ justifyContent: "space-between", marginBottom: 10 }}>
                  <span style={{ color: T.muted, fontSize: 13 }}>
                    Today: <span className="ll-num" style={{ color: T.ink }}>{fmtVol(todayVol)}</span> {isBodyweight(todaySets) ? "reps" : "vol"}
                  </span>
                  {!data.hideDeltas && <Delta value={liveDelta} />}
                </Row>
              )}
            </>
          )}

          {/* note */}
          <textarea className="ll-input" placeholder="Note for today (seat position, pain, tempo…)"
            value={entry ? entry.note : ""} rows={1}
            onChange={(e) => update((d) => { ensureEntry(d).note = e.target.value; })} />

          {/* swap exercise */}
          <div style={{ marginTop: 10 }}>
            {swapping ? (
              <Row>
                <input className="ll-input" autoFocus placeholder="What are you doing instead?" value={swapText}
                  onChange={(e) => setSwapText(e.target.value)} />
                <button className="ll-btn ll-btn-sm ll-btn-chalk" onClick={() => {
                  update((d) => { ensureEntry(d).swapName = swapText.trim(); });
                  setSwapping(false);
                }}>Set</button>
              </Row>
            ) : entry && entry.swapName ? (
              <button className="ll-btn ll-btn-sm" onClick={() => update((d) => { ensureEntry(d).swapName = ""; })}>
                Undo swap (back to {ex.name})
              </button>
            ) : (
              <button style={{ background: "none", border: "none", color: T.faint, fontSize: 13, cursor: "pointer", padding: 0, fontFamily: "inherit" }}
                onClick={() => { setSwapText(""); setSwapping(true); }}>
                ⇄ Swap exercise for today
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function TodayView({ data, update, day, setDay, notes, refreshInbox, deliverNote }) {
  const rw = rewardOf(data);
  const [weekOffset, setWeekOffset] = useState(0);
  const curWeek = Math.max(0, weekOfCycle(data, todayISO()));
  const maxWeek = Math.max((data.cycleWeeks || 8) - 1, curWeek);
  const wIdx = Math.min(maxWeek, Math.max(0, curWeek + weekOffset));
  const existing = daySessionIn(data, day, wIdx);
  const dateFor = existing ? existing.date : cellDateFor(data.cycleStart, wIdx, day);
  const sessionKey = existing ? existing.key : `${dateFor}|${day}`;
  const exList = data.exercises.filter((e) => e.day === day);
  const isToday = dateFor === todayISO();

  const sess = data.sessions[sessionKey];
  const [celebration, setCelebration] = useState(null);
  const [dayNoteOpen, setDayNoteOpen] = useState(false);
  const [dayNoteDraft, setDayNoteDraft] = useState("");
  useEffect(() => { setDayNoteOpen(false); }, [sessionKey]);

  useEffect(() => {
    if (!DAYS.includes(day)) setDay(defaultDay());
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [data.refeedDay, day]);

  /* Completion: every planned set of every exercise is filled or skipped —
     an exercise with a missing entry or missing rows counts its full target */
  let totalSets = 0, filledSets = 0;
  exList.forEach((ex) => {
    const e = sess && sess.entries[ex.id];
    const planned = e ? e.sets.filter((s) => !s.extra) : [];
    const expected = Math.max(planned.length, ex.targetSets || 3);
    totalSets += expected;
    filledSets += e && e.skippedAll ? expected : planned.filter((s) => num(s.r) > 0 || s.skipped).length;
  });
  const complete = exList.length > 0 && totalSets > 0 && filledSets >= totalSets;

  const started = !!(sess && sess.startedAt);

  const startWorkout = () =>
    update((d) => {
      if (!d.sessions[sessionKey]) d.sessions[sessionKey] = { date: sessionKey.split("|")[0], day, entries: {} };
      d.sessions[sessionKey].startedAt = Date.now();
    });

  const stopWorkout = () =>
    update((d) => {
      const s = d.sessions[sessionKey];
      if (s) { delete s.startedAt; delete s.pausedAt; delete s.pausedAccum; }
    });

  const togglePause = () =>
    update((d) => {
      const s = d.sessions[sessionKey];
      if (!s) return;
      if (s.pausedAt) { s.pausedAccum = (s.pausedAccum || 0) + (Date.now() - s.pausedAt); delete s.pausedAt; }
      else { s.pausedAt = Date.now(); }
    });

  const setStartTime = (ts) =>
    update((d) => {
      const s = d.sessions[sessionKey];
      if (s && s.startedAt) s.startedAt = ts;
    });

  const openDayNote = () => {
    setDayNoteDraft((sess && sess.dayNote) || "");
    setDayNoteOpen(true);
  };

  const saveDayNote = () => {
    const val = dayNoteDraft.trim();
    update((d) => {
      if (!d.sessions[sessionKey]) d.sessions[sessionKey] = { date: sessionKey.split("|")[0], day, entries: {} };
      const s = d.sessions[sessionKey];
      if (val) s.dayNote = val; else delete s.dayNote;
    });
    setDayNoteOpen(false);
  };

  const lastDayNote = sortedSessions(data)
    .filter((s) => s.day === day && s.date < dateFor && (s.dayNote || "").trim())
    .slice(-1)[0] || null;

  const doneOuter = !!(sess && sess.celebrated);
  const [charging, setCharging] = useState(false);
  const prevReadyRef = useRef(false);
  useEffect(() => {
    const readyNow = complete && !doneOuter;
    if (readyNow && !prevReadyRef.current) {
      setCharging(true);
      setTimeout(() => setCharging(false), 800);
    }
    prevReadyRef.current = readyNow;
  }, [complete, doneOuter]);

  const fireCelebration = (notesList) => {
    const who = (data.userName || "champ").trim();
    const sDate = sess ? sess.date : todayISO();
    const acks = data.noteAcks || {};
    const due = (notesList || notes || [])
      .filter((n) => n && n.text && n.date <= sDate && !acks[n.id])
      .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : (a.createdAt || 0) - (b.createdAt || 0)));
    const note = due[0] || null;
    const msg = note
      ? note.text.replace(/\{name\}/g, who)
      : CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)].replace(/\{name\}/g, who);
    const preRefeed = data.refeedDay
      ? day === WEEK[(WEEK.indexOf(data.refeedDay) + 6) % 7]
      : day === "Friday";

    /* Record day: today's volume beats this day's previous week */
    let record = false;
    if (sess) {
      const wNow = weekOfCycle(data, sess.date);
      let prevDay = null;
      for (let k = wNow - 1; k >= 0; k--) { const p = daySessionIn(data, day, k); if (p) { prevDay = p; break; } }
      record = !!(prevDay && dayVolume(sess) > dayVolume(prevDay));
    }

    /* Cycle finale: this finish closes out the final week's schedule */
    let finale = null;
    const finalW = (data.cycleWeeks || 8) - 1;
    if (wIdx === finalW && DAYS.every((dd) => OPTIONAL_DAYS[dd] || dd === day || daySessionIn(data, dd, wIdx))) {
      const inCycle = sortedSessions(data).filter((x) => weekOfCycle(data, x.date) >= 0);
      const vol = inCycle.reduce((a, x) => a + dayVolume(x), 0);
      let wins = 0;
      DAYS.forEach((dd) => {
        for (let wi = 0; wi <= finalW; wi++) {
          const sx = daySessionIn(data, dd, wi);
          if (!sx) continue;
          let pv = null;
          for (let k = wi - 1; k >= 0; k--) { const p = daySessionIn(data, dd, k); if (p) { pv = p; break; } }
          if (pv && dayVolume(sx) > dayVolume(pv)) wins += 1;
        }
      });
      let best = null;
      data.exercises.forEach((ex) => {
        const h = historyFor(data, ex.id).filter((x) => weekOfCycle(data, x.date) >= 0);
        if (h.length >= 2) {
          const v0 = volumeOf(h[0].entry.sets), v1 = volumeOf(h[h.length - 1].entry.sets);
          if (v0 > 0) {
            const p = ((v1 - v0) / v0) * 100;
            if (!best || p > best.pctv) best = { name: ex.name, pctv: p };
          }
        }
      });
      const per = data.unit === "lb" ? 4000 : 1800;
      finale = { vol, wins, best, trucks: Math.max(1, Math.round(vol / per)) };
    }

    setCelebration({ msg, from: note ? PARTNER_NAME : null, image: note ? (note.image || null) : null, refeed: preRefeed, reward: rewardOf(data), record, finale });
    if (note && deliverNote) deliverNote(note.id);
    update((d) => {
      const s = d.sessions[sessionKey];
      if (s) {
        if (s.pausedAt) { s.pausedAccum = (s.pausedAccum || 0) + (Date.now() - s.pausedAt); delete s.pausedAt; }
        s.celebrated = true;
        s.finishedAt = Date.now();
      }
    });
  };

  return (
    <div>
      {celebration && <Celebration {...celebration} onClose={() => setCelebration(null)} />}
      {weekOffset === 0 && started && !(sess && sess.celebrated) && (
        <WorkoutBar
          startedAt={sess && sess.startedAt}
          pausedAt={sess && sess.pausedAt}
          pausedAccum={sess && sess.pausedAccum}
          hidden={!!data.hideClock}
          onToggleHide={() => update((d) => { d.hideClock = !d.hideClock; })}
          onStop={stopWorkout}
          onTogglePause={togglePause}
          onSetStart={setStartTime}
        />
      )}
      <Row style={{ gap: 4, flexWrap: "wrap", padding: "6px 2px 12px", alignItems: "center" }}>
        <button className="ll-chip ll-day" disabled={wIdx <= 0} aria-label="previous week"
          style={{ opacity: wIdx <= 0 ? 0.35 : 1 }}
          onClick={() => setWeekOffset(weekOffset - 1)}>‹</button>
        {DAYS.map((d) => {
          const st = dayWeekStatus(data, d, wIdx);
          return (
            <button key={d} className={`ll-chip ll-day ${d === day ? "on" : ""} ${st === "star" ? "starred" : ""} ${OPTIONAL_DAYS[d] ? "optional" : ""}`}
              style={st === "star" ? { borderColor: `${rw.color}8C`, background: `${rw.color}12`, boxShadow: `0 0 9px ${rw.color}59` } : {}}
              onClick={() => setDay(d)}>
              <DayStatusIcon status={st} size={7} data={data} />
              {DAYS.length > 4 ? d.slice(0, 1) : d.slice(0, 3)}
            </button>
          );
        })}
        <button className="ll-chip ll-day" disabled={wIdx >= maxWeek} aria-label="next week"
          style={{ opacity: wIdx >= maxWeek ? 0.35 : 1 }}
          onClick={() => setWeekOffset(weekOffset + 1)}>›</button>
      </Row>
      <Row style={{ justifyContent: "space-between", marginBottom: 10 }}>
        <div>
          <div className="ll-display" style={{ fontSize: 26, fontWeight: 700 }}>
            {day} <span style={{ color: T.muted, fontSize: 17, fontWeight: 500 }}>· {fmtDate(dateFor)}</span>
          </div>
          <div style={{ color: T.muted, fontSize: 13 }}>
            Cycle {data.cycleNumber} · Week {wIdx + 1}{OPTIONAL_DAYS[day] ? " · optional day" : ""}{isToday ? " · today" : weekOffset < 0 ? " · past week" : weekOffset > 0 ? " · upcoming" : ""}
          </div>
        </div>
      </Row>
      <div style={{ marginBottom: 10 }}>
        {dayNoteOpen ? (
          <>
            <textarea className="ll-input" autoFocus rows={2} style={{ width: "100%" }}
              placeholder="Note for the whole day (sleep, energy, soreness…)"
              value={dayNoteDraft}
              onChange={(e) => setDayNoteDraft(e.target.value)} />
            <Row style={{ marginTop: 8 }}>
              <button className="ll-btn ll-btn-chalk" style={{ flex: 1 }} onClick={saveDayNote}>Save note</button>
              <button className="ll-btn" onClick={() => setDayNoteOpen(false)}>Cancel</button>
            </Row>
          </>
        ) : ((sess && sess.dayNote) || "").trim() ? (
          <div className="ll-note" style={{ cursor: "pointer" }} onClick={openDayNote}>
            “{sess.dayNote}”
            <span style={{ color: T.faint, fontSize: 11, marginLeft: 8 }}>tap to edit</span>
          </div>
        ) : (
          <div onClick={openDayNote} style={{ color: T.faint, fontSize: 12.5, cursor: "pointer" }}>
            + Note for the whole day
          </div>
        )}
        {!dayNoteOpen && lastDayNote && (
          <div style={{ color: T.faint, fontSize: 12, marginTop: 6 }}>
            Last {day} ({fmtDate(lastDayNote.date)}): “{lastDayNote.dayNote}”
          </div>
        )}
      </div>
      {weekOffset === 0 && !started && !(sess && sess.celebrated) && exList.length > 0 && (
        <button onClick={startWorkout}
          style={{
            width: "100%", padding: 14, marginBottom: 12, fontSize: 15, fontWeight: 700,
            borderRadius: 12, cursor: "pointer", fontFamily: "inherit",
            background: "rgba(91,157,255,0.12)", border: "1px solid rgba(91,157,255,0.55)", color: T.blue,
          }}>
          ▶ Start Workout
        </button>
      )}
      {exList.map((ex) => (
        <ExerciseCard key={ex.id} data={data} update={update} ex={ex} sessionKey={sessionKey} dayColor={DAY_COLOR[day]} />
      ))}
      {exList.length > 0 && weekOffset === 0 && (() => {
        const done = !!(sess && sess.celebrated);
        const ready = complete && !done;
        const pctFill = totalSets > 0 ? Math.min(1, filledSets / totalSets) * 100 : 0;
        const durMin = sess && sess.startedAt && sess.finishedAt
          ? Math.max(1, Math.round((sess.finishedAt - sess.startedAt - (sess.pausedAccum || 0)) / 60000))
          : null;
        return (
          <button disabled={!ready} onClick={async () => { const fresh = refreshInbox ? await refreshInbox() : null; fireCelebration(fresh); }} className={charging && ready ? "ll-charge" : ""}
            style={{
              width: "100%", padding: 14, marginTop: 4, fontSize: 15, fontWeight: 700,
              borderRadius: 12, cursor: ready ? "pointer" : "default", fontFamily: "inherit",
              background: ready
                ? T.pos
                : done
                  ? "rgba(105,181,109,0.15)"
                  : `linear-gradient(90deg, rgba(105,181,109,0.3) ${pctFill}%, ${T.surface2} ${pctFill}%)`,
              border: `1px solid ${ready ? T.pos : done ? "rgba(105,181,109,0.45)" : T.line}`,
              color: ready ? "#0F1512" : done ? T.pos : T.faint,
              opacity: ready || done ? 1 : 0.65,
              boxShadow: ready ? "0 0 12px rgba(105,181,109,0.4)" : "none",
            }}>
            {done
            ? `${rewardOf(data).char} Workout finished${durMin ? ` · ${durMin} min` : ""}`
            : ready ? "Finish Workout" : `Finish Workout · ${filledSets}/${totalSets} sets`}
          </button>
        );
      })()}
      {exList.length === 0 && (
        <div style={{ color: T.muted, textAlign: "center", padding: 30 }}>
          No exercises for {day} yet. Add some in Manage.
        </div>
      )}
    </div>
  );
}

/* Progress view                                                       */
/* ------------------------------------------------------------------ */
/* ------------------------------------------------------------------ */
/* Trends — bodyweight, streak, charts                                 */
/* ------------------------------------------------------------------ */
const weightEntries = (data) =>
  Object.entries(data.weights || {})
    .map(([iso, v]) => ({ iso, v }))
    .sort((a, b) => (a.iso < b.iso ? -1 : a.iso > b.iso ? 1 : 0));

function weightTrend(data) {
  const es = weightEntries(data).filter((e) => e.iso >= data.cycleStart);
  if (es.length < 2) return null;
  const first = es[0], last = es[es.length - 1];
  return Math.round((last.v - first.v) * 10) / 10;
}

function scheduledSlots(data, uptoIso) {
  const slots = [];
  const totalW = weekOfCycle(data, uptoIso);
  for (let w = 0; w <= totalW; w++) {
    for (const day of DAYS) {
      const date = cellDateFor(data.cycleStart, w, day);
      if (date >= data.cycleStart && date <= uptoIso) slots.push({ day, date, week: w });
    }
  }
  return slots.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
}

function currentStreak(data) {
  const slots = scheduledSlots(data, todayISO());
  let n = 0;
  for (let i = slots.length - 1; i >= 0; i--) {
    const sl = slots[i];
    if (daySessionIn(data, sl.day, sl.week)) { n++; continue; }
    if (sl.date === todayISO()) continue;
    if (OPTIONAL_DAYS[sl.day]) continue;
    break;
  }
  return n;
}

const sen = (sx) =>
  (sx && sx.startedAt && sx.finishedAt)
    ? Math.round((sx.finishedAt - sx.startedAt - (sx.pausedAccum || 0)) / 60000)
    : null;

function LineChart({ points, color, fmt, showValues, onSelect }) {
  const [sel, setSel] = useState(points.length - 1);
  useEffect(() => {
    setSel(points.length - 1);
    if (onSelect && points.length) onSelect(points[points.length - 1], points.length - 1);
  }, [points.length]);

  if (points.length === 0)
    return <div style={{ color: T.muted, fontSize: 13, padding: "18px 4px" }}>Not enough data yet — log a couple of sessions.</div>;
  if (points.length === 1) {
    const p = points[0];
    return (
      <div style={{ padding: "10px 4px" }}>
        <div className="ll-num" style={{ fontSize: 20, fontWeight: 700, color: T.ink }}>{fmt(p.value)}</div>
        <div style={{ color: T.muted, fontSize: 12.5, marginTop: 3 }}>{p.label} · one more session draws the line.</div>
      </div>
    );
  }

  const W = 320, H = 150, padX = 6, padB = 22;
  const padT = showValues ? 26 : 16;
  const vals = points.map((p) => p.value);
  let lo = Math.min(...vals), hi = Math.max(...vals);
  const span = (hi - lo) || Math.abs(hi) || 1;
  lo = Math.max(0, lo - span * 0.18);
  hi = hi + span * 0.18;
  const x = (i) => padX + (i / (points.length - 1)) * (W - padX * 2);
  const y = (v) => padT + (1 - (v - lo) / (hi - lo || 1)) * (H - padT - padB);

  const gid = "grad-" + color.replace(/[^a-z0-9]/gi, "");
  const linePath = "M" + points.map((p, i) => `${x(i)},${y(p.value)}`).join(" L");
  const areaPath = linePath + ` L${x(points.length - 1)},${H - padB} L${x(0)},${H - padB} Z`;
  const step = Math.ceil(points.length / 6);
  const activeIdx = Math.min(sel, points.length - 1);
  const ap = points[activeIdx];
  const vStep = Math.ceil(points.length / 10);

  return (
    <div>
      <Row style={{ justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 11.5, color: T.faint }}>{ap.label}{ap.sub ? ` · ${ap.sub}` : ""}</span>
        <span className="ll-num" style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{fmt(ap.value)}</span>
      </Row>
      <svg viewBox="0 0 320 150" style={{ width: "100%", height: "auto", display: "block", overflow: "visible" }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.28" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0, 0.5, 1].map((f) => {
          const gy = padT + f * (H - padT - padB);
          return <line key={f} x1={padX} x2={W - padX} y1={gy} y2={gy} stroke={T.line} strokeDasharray="3 4" strokeWidth="1" />;
        })}
        <path d={areaPath} fill={`url(#${gid})`} />
        <path d={linePath} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
        {points.map((p, i) => {
          const show = i === points.length - 1 || i % step === 0;
          return show
            ? <text key={`t${i}`} x={x(i)} y={H - 6} fontSize="9" fill={T.faint} textAnchor="middle">{p.short}</text>
            : null;
        })}
        {points.map((p, i) => (
          <g key={`p${i}`}>
            <circle cx={x(i)} cy={y(p.value)} r="12" fill="transparent" style={{ cursor: "pointer" }} onClick={() => { setSel(i); if (onSelect) onSelect(p, i); }} />
            {i === sel
              ? <circle cx={x(i)} cy={y(p.value)} r="4.5" fill={color} />
              : <circle cx={x(i)} cy={y(p.value)} r="2.8" fill={T.bg} stroke={color} strokeWidth="1.5" />}
          </g>
        ))}
        {showValues && points.map((p, i) => {
          const shown = i % vStep === 0 || i === points.length - 1 || i === activeIdx;
          if (!shown) return null;
          const active = i === activeIdx;
          return <text key={`v${i}`} x={x(i)} y={y(p.value) - 9} textAnchor="middle" fontSize="8.5"
            fontWeight={active ? 700 : 400} fill={active ? color : T.muted}>{p.value}</text>;
        })}
      </svg>
    </div>
  );
}

function StatStrip({ data }) {
  const es = weightEntries(data);
  const latest = es.length ? es[es.length - 1].v : null;
  const trend = weightTrend(data);
  const streak = currentStreak(data);

  let wins = 0;
  DAYS.forEach((d) => {
    const list = sortedSessions(data).filter(
      (s) => s.day === d && weekOfCycle(data, s.date) >= 0 && Object.values(s.entries).some(entryHasData)
    );
    for (let i = 1; i < list.length; i++) {
      if (dayVolume(list[i]) > dayVolume(list[i - 1])) wins += 1;
    }
  });

  const trendStr = trend == null ? "—" : (trend < 0 ? `−${Math.abs(trend)}` : `+${trend}`);
  const tiles = [
    { label: "Weight", value: latest != null ? `${latest}` : "—" },
    { label: "Trend", value: trendStr, color: trend == null ? null : T.blue },
    { label: "Streak", value: String(streak) },
    { label: "Wins", value: String(wins) },
  ];

  return (
    <Row style={{ gap: 8, marginBottom: 14 }}>
      {tiles.map((t) => (
        <div key={t.label} className="ll-card" style={{ flex: 1, margin: 0, padding: "9px 4px", textAlign: "center" }}>
          <div className="ll-num" style={{ fontSize: 15, fontWeight: 700, color: t.color || T.ink }}>{t.value}</div>
          <div style={{ fontSize: 9.5, textTransform: "uppercase", letterSpacing: "0.05em", color: T.faint, marginTop: 2 }}>{t.label}</div>
        </div>
      ))}
    </Row>
  );
}

function TrendCard({ data, update, day }) {
  const [metric, setMetric] = useState("volume");
  const [scope, setScope] = useState("all");
  const [wInput, setWInput] = useState("");
  const [wDate, setWDate] = useState(todayISO());
  const [selWeight, setSelWeight] = useState(null);
  const bwUnit = data.bwUnit || "lb";
  const collapsed = !!data.chartsCollapsed;

  const inCycle = sortedSessions(data).filter(
    (s) => weekOfCycle(data, s.date) >= 0 && Object.values(s.entries).some(entryHasData)
  );

  const byWeek = {};
  inCycle.forEach((s) => {
    const w = weekOfCycle(data, s.date);
    (byWeek[w] = byWeek[w] || []).push(s);
  });
  const weeks = Object.keys(byWeek).map(Number).sort((a, b) => a - b);
  const scoped = scope === "day" ? inCycle.filter((s) => s.day === day) : inCycle;
  const domShort = (iso) => String(new Date(iso + "T12:00:00").getDate());

  let chart;
  if (metric === "weight") {
    const pts = weightEntries(data).map((e) => ({ label: fmtDate(e.iso), short: e.iso.slice(8, 10), value: e.v, iso: e.iso }));
    chart = { points: pts, color: T.blue, fmt: (v) => `${v} ${bwUnit}` };
  } else if (metric === "duration") {
    const pts = scope === "all"
      ? weeks.map((w) => ({ w, ds: byWeek[w].map(sen).filter((x) => x != null && x > 0) }))
          .filter((x) => x.ds.length)
          .map((x) => ({
            label: `Week ${x.w + 1} average`,
            short: `W${x.w + 1}`,
            value: Math.round(x.ds.reduce((a, b) => a + b, 0) / x.ds.length),
            sub: `${x.ds.length} timed sessions`,
          }))
      : scoped.map((s) => ({ s, d: sen(s) })).filter((x) => x.d != null && x.d > 0)
          .map((x) => ({ label: `${x.s.day} · ${fmtDate(x.s.date)}`, short: domShort(x.s.date), value: x.d }));
    chart = { points: pts, color: T.amber, fmt: (n) => `${n} min` };
  } else {
    const pts = scope === "all"
      ? weeks.map((w) => {
          const list = byWeek[w];
          return { label: `Week ${w + 1}`, short: `W${w + 1}`, value: list.reduce((a, s) => a + dayVolume(s), 0), sub: `${list.length} sessions` };
        })
      : scoped.map((s) => ({ label: `${s.day} · ${fmtDate(s.date)}`, short: domShort(s.date), value: dayVolume(s) }));
    chart = { points: pts, color: T.pos, fmt: fmtVol };
  }

  const saveWeight = () => {
    const v = parseFloat(wInput);
    if (!(v > 0)) return;
    const rounded = Math.round(v * 10) / 10;
    const iso = /^\d{4}-\d{2}-\d{2}$/.test(wDate) ? wDate : todayISO();
    update((d) => { if (!d.weights) d.weights = {}; d.weights[iso] = rounded; });
    setWInput("");
  };

  const deleteWeight = (iso) => {
    update((d) => { if (d.weights) delete d.weights[iso]; });
    setSelWeight(null);
  };

  let durText = null;
  if (metric === "duration") {
    const src = scope === "day" ? inCycle.filter((s) => s.day === day) : inCycle;
    const durList = src.map(sen).filter((x) => x != null && x > 0);
    if (durList.length) {
      const avg = Math.round(durList.reduce((a, b) => a + b, 0) / durList.length);
      const longest = Math.max(...durList);
      durText = (scope === "all" ? "Weekly average session length. " : "") +
        `Average ${avg} min · longest ${longest} min · ${durList.length} timed sessions`;
    }
  }

  const chip = (on, lbl, onClick) => (
    <button key={lbl} className={`ll-chip ll-day ${on ? "on" : ""}`}
      style={on ? { borderColor: T.blue, color: T.blue } : {}} onClick={onClick}>{lbl}</button>
  );

  return (
    <div className="ll-card" style={{ padding: 14, marginBottom: 14 }}>
      <div role="button" aria-expanded={!collapsed}
        style={{ display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer", marginBottom: collapsed ? 0 : 10, padding: "2px 0" }}
        onClick={() => update((d) => { d.chartsCollapsed = !d.chartsCollapsed; })}>
        <span className="ll-display" style={{ fontSize: 15, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", color: T.muted }}>Trends</span>
        <Row style={{ gap: 5 }}>
          <span style={{ fontSize: 11, color: T.faint }}>{collapsed ? "expand" : "collapse"}</span>
          <span style={{ fontSize: 13, color: T.faint }}>{collapsed ? "▸" : "▾"}</span>
        </Row>
      </div>
      {collapsed ? null : (
        <>
          <Row style={{ gap: 6, rowGap: 6, flexWrap: "wrap", alignItems: "center", marginBottom: metric === "weight" ? 12 : 8 }}>
            {[["volume", "Volume"], ["duration", "Time"], ["weight", "Bodyweight"]].map(([m, lbl]) =>
              chip(metric === m, lbl, () => setMetric(m)))}
          </Row>
          {metric !== "weight" && (
            <Row style={{ gap: 6, rowGap: 6, flexWrap: "wrap", alignItems: "center", marginBottom: 12 }}>
              {[["all", "Weekly"], ["daily", "Daily"], ["day", day.slice(0, 3)]].map(([id, lbl]) => (
                <button key={id} className={`ll-chip ll-day ${scope === id ? "on" : ""}`}
                  style={{ fontSize: 11.5, padding: "4px 9px", ...(scope === id ? { borderColor: T.muted, color: T.ink } : {}) }}
                  onClick={() => setScope(id)}>{lbl}</button>
              ))}
            </Row>
          )}
          <LineChart points={chart.points} color={chart.color} fmt={chart.fmt} showValues={metric === "weight"}
            onSelect={metric === "weight" ? (p) => setSelWeight(p && p.iso ? p.iso : null) : null} />
          {metric === "weight" && (
            <div style={{ marginTop: 12 }}>
              <Row style={{ gap: 8 }}>
                <input type="date" value={wDate} max={todayISO()} onChange={(e) => setWDate(e.target.value)}
                  className="ll-input" style={{ flex: 1, padding: "6px 8px" }} />
                <input className="ll-input" inputMode="decimal" value={wInput} placeholder={bwUnit}
                  onChange={(e) => setWInput(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") saveWeight(); }}
                  style={{ width: 84, textAlign: "center", padding: "6px 8px" }} />
                <button className="ll-btn ll-btn-chalk" onClick={saveWeight}>Log</button>
              </Row>
              <div style={{ color: T.faint, fontSize: 11.5, marginTop: 8 }}>Backdate freely — pick any date to import readings from another app. Same date overwrites.</div>
              {selWeight && data.weights && data.weights[selWeight] != null && (
                <Row style={{ justifyContent: "space-between", alignItems: "center", marginTop: 12, padding: "10px 12px", background: T.surface2, border: `1px solid ${T.line}`, borderRadius: 10 }}>
                  <div>
                    <div style={{ fontSize: 12.5, color: T.muted }}>{fmtDate(selWeight)}</div>
                    <div className="ll-num" style={{ fontSize: 18, fontWeight: 700, color: T.ink }}>{data.weights[selWeight]} {bwUnit}</div>
                  </div>
                  <button className="ll-btn ll-btn-sm" style={{ color: T.neg, borderColor: T.neg }} onClick={() => deleteWeight(selWeight)}>Delete</button>
                </Row>
              )}
            </div>
          )}
          {durText && <div style={{ color: T.faint, fontSize: 11, marginTop: 10 }}>{durText}</div>}
        </>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Cycle grid — the whole cycle at a glance, like the sheet's columns  */
/* ------------------------------------------------------------------ */
function CycleGrid({ data, onOpenDay, onGoToday }) {
  const today = todayISO();
  const curWeek = Math.max(0, weekOfCycle(data, today));
  const weeks = Math.max(data.cycleWeeks || 8, curWeek + 1);
  const cols = Array.from({ length: weeks }, (_, w) => w);
  const rw = rewardOf(data);
  const monthOf = (w) =>
    new Date(addDays(data.cycleStart, w * 7) + "T12:00:00").toLocaleDateString("en-US", { month: "short" });
  const domOf = (w) => new Date(addDays(data.cycleStart, w * 7) + "T12:00:00").getDate();

  return (
    <div className="ll-card" style={{ padding: "12px 14px", marginBottom: 14 }}>
      <Row style={{ justifyContent: "space-between", marginBottom: 10 }}>
        <span className="ll-display" style={{ fontSize: 16, fontWeight: 600, letterSpacing: "0.05em", textTransform: "uppercase" }}>
          {data.cycleName || `Cycle ${data.cycleNumber}`}
        </span>
        <span className="ll-num" style={{ color: T.faint, fontSize: 11.5 }}>week {Math.min(curWeek + 1, weeks)} of {weeks}</span>
      </Row>
      <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        <div style={{ minWidth: weeks * 30 + 46 }}>
          <Row style={{ gap: 4 }}>
            <span style={{ width: 42, flex: "none" }} />
            {cols.map((w) => (
              <span key={w} style={{ width: 26, flex: "none", fontSize: 9, color: T.faint, whiteSpace: "nowrap", overflow: "visible" }}>
                {w === 0 || monthOf(w) !== monthOf(w - 1) ? monthOf(w) : ""}
              </span>
            ))}
          </Row>
          <Row style={{ gap: 4, marginBottom: 5 }}>
            <span style={{ width: 42, flex: "none" }} />
            {cols.map((w) => (
              <span key={w} style={{ width: 26, flex: "none", textAlign: "center" }}>
                <span className="ll-num" style={{ display: "block", fontSize: 10, color: w === curWeek ? T.ink : T.faint, fontWeight: w === curWeek ? 700 : 400 }}>{w + 1}</span>
                <span className="ll-num" style={{ display: "block", fontSize: 8.5, color: T.faint }}>{domOf(w)}</span>
              </span>
            ))}
          </Row>
          {DAYS.map((d) => (
            <Row key={d} style={{ gap: 4, marginBottom: 5 }}>
              <span style={{ width: 42, flex: "none", fontSize: 11, color: T.muted, alignSelf: "center" }}>{d.slice(0, 3)}</span>
              {cols.map((w) => {
                const sess = daySessionIn(data, d, w);
                const dateIso = cellDateFor(data.cycleStart, w, d);
                let style = {
                  width: 26, height: 22, flex: "none", borderRadius: 5, padding: 0,
                  border: `1px solid ${T.line}`, background: "transparent",
                  color: T.faint, fontSize: 9, cursor: "default", fontFamily: "inherit",
                };
                let content = "";
                let onClick;
                if (sess) {
                  let prev = null;
                  for (let i = w - 1; i >= 0; i--) { const p = daySessionIn(data, d, i); if (p) { prev = p; break; } }
                  const dv = dayVolume(sess);
                  const pv = prev ? dayVolume(prev) : null;
                  const finishedCell = sess.celebrated || sess.date < today;
                  if (!finishedCell) {
                    content = <span style={{ width: 8, height: 8, borderRadius: 4, background: T.pos, display: "inline-block" }} />;
                  } else if (pv !== null && dv > pv) {
                    content = rw.char;
                    style.fontSize = 13;
                    style.filter = `drop-shadow(0 0 5px ${rw.color}99)`;
                    style.border = `1px solid ${rw.color}66`;
                    if (rw.rainbow) {
                      Object.assign(style, rainbowText());
                    } else {
                      style.color = rw.color;
                      style.background = `${rw.color}1A`;
                    }
                  } else if (pv !== null && dv < pv) {
                    content = <span style={{ width: 8, height: 8, borderRadius: 4, background: T.neg, display: "inline-block" }} />;
                  } else {
                    content = <span style={{ width: 8, height: 8, borderRadius: 4, background: T.pos, display: "inline-block" }} />;
                  }
                  style.cursor = "pointer";
                  onClick = () => onOpenDay(sess.key);
                } else if (dateIso === today) {
                  style.border = `2px solid ${T.blue}`;
                  style.cursor = "pointer";
                  onClick = () => onGoToday(d);
                } else if (dateIso < today) {
                  if (OPTIONAL_DAYS[d]) {
                    content = "•";
                    style.opacity = 0.55;
                  } else {
                    content = "✕";
                  }
                } else {
                  style.opacity = 0.35;
                }
                if (dateIso === today) {
                  style.border = `2px solid ${T.blue}`;
                  if (!onClick) { style.cursor = "pointer"; onClick = () => onGoToday(d); }
                }
                return (
                  <button key={w} style={style} onClick={onClick} disabled={!onClick}
                    title={`${d} · ${fmtDate(dateIso)}`}
                    aria-label={`${d} ${fmtDate(dateIso)}${sess ? ", open log" : dateIso < today ? ", missed" : ""}`}>
                    {content}
                  </button>
                );
              })}
            </Row>
          ))}
        </div>
      </div>
      <Row style={{ gap: 12, marginTop: 9, flexWrap: "wrap" }}>
        <Row style={{ gap: 5 }}><RewardGlyph data={data} size={12} /><span style={{ fontSize: 10.5, color: T.faint }}>beat prev week</span></Row>
        <Row style={{ gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 4, background: T.neg, flex: "none" }} /><span style={{ fontSize: 10.5, color: T.faint }}>vol down</span></Row>
        <Row style={{ gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 4, background: T.pos, flex: "none" }} /><span style={{ fontSize: 10.5, color: T.faint }}>logged</span></Row>
        <Row style={{ gap: 5 }}><span style={{ fontSize: 10.5, color: T.faint }}>✕ missed</span></Row>
        {DAYS.some((d) => OPTIONAL_DAYS[d]) && (
          <Row style={{ gap: 5 }}><span style={{ fontSize: 10.5, color: T.faint }}>• optional rest</span></Row>
        )}
        <Row style={{ gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 4, border: `2px solid ${T.blue}`, flex: "none" }} /><span style={{ fontSize: 10.5, color: T.faint }}>today</span></Row>
      </Row>
    </div>
  );
}

function ProgressView({ data, update, day, setDay, onGoToday }) {
  const rw = rewardOf(data);
  const [openEx, setOpenEx] = useState(null);
  const [openDayKey, setOpenDayKey] = useState(null);
  const [timeEdit, setTimeEdit] = useState(null);

  /* Day log drill-in from the cycle grid */
  if (openDayKey && data.sessions[openDayKey]) {
    const sess = data.sessions[openDayKey];
    const d = sess.day;
    const w = weekOfCycle(data, sess.date);
    let prev = null;
    for (let i = w - 1; i >= 0; i--) { const p = daySessionIn(data, d, i); if (p) { prev = p; break; } }
    const vol = dayVolume(sess);
    const delta = prev ? pct(dayVolume(prev), vol) : null;
    const hasStamps = sess.startedAt && sess.finishedAt;
    const durMin = hasStamps
      ? Math.max(0, Math.round((sess.finishedAt - sess.startedAt - (sess.pausedAccum || 0)) / 60000))
      : null;
    const pickWhich = (which) => {
      const ts = which === "start"
        ? (sess.startedAt || Date.now())
        : (sess.finishedAt || sess.startedAt || Date.now());
      setTimeEdit({ which, date: toDateStr(ts), time: to24(ts) });
    };
    const saveTime = () => {
      if (!timeEdit) return;
      const ts = dtToTs(timeEdit.date, timeEdit.time);
      if (ts == null) { setTimeEdit(null); return; }
      update((dd) => {
        const s = dd.sessions[openDayKey];
        if (!s) return;
        if (timeEdit.which === "start") s.startedAt = ts; else s.finishedAt = ts;
        if (s.startedAt && s.finishedAt && s.finishedAt < s.startedAt) {
          const t = s.startedAt; s.startedAt = s.finishedAt; s.finishedAt = t;
        }
      });
      setTimeEdit(null);
    };
    return (
      <div className="ll-fade">
        <button className="ll-btn ll-btn-sm" style={{ marginBottom: 12 }} onClick={() => setOpenDayKey(null)}>← Back</button>
        <Row style={{ justifyContent: "space-between", marginBottom: 2 }}>
          <div className="ll-display" style={{ fontSize: 24, fontWeight: 700 }}>{d} · {fmtDate(sess.date)}</div>
          <Delta value={delta} />
        </Row>
        <div style={{ color: T.muted, fontSize: 13, marginBottom: 14 }}>
          Week {w + 1} · day volume <span className="ll-num">{fmtVol(vol)}</span>
          {prev ? ` · vs week ${weekOfCycle(data, prev.date) + 1}` : ""}
        </div>
        {(sess.dayNote || "").trim() && <div className="ll-note" style={{ marginBottom: 14 }}>“{sess.dayNote}”</div>}
        <div className="ll-card" style={{ padding: "12px 14px", marginBottom: 14 }}>
          <Row style={{ justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", color: T.faint }}>Duration</div>
              {durMin != null
                ? <span className="ll-num" style={{ fontSize: 18, fontWeight: 700 }}>{durMin} min</span>
                : <span style={{ color: T.muted, fontSize: 13.5 }}>No workout time recorded</span>}
            </div>
            {!timeEdit && <button className="ll-btn ll-btn-sm" onClick={() => pickWhich("start")}>Edit time</button>}
          </Row>
          {timeEdit && (
            <div style={{ marginTop: 12 }}>
              <Row style={{ gap: 8, marginBottom: 10 }}>
                {[["start", "Started", sess.startedAt], ["finish", "Finished", sess.finishedAt]].map(([which, lbl, ts]) => {
                  const on = timeEdit.which === which;
                  return (
                    <button key={which} className="ll-chip" onClick={() => pickWhich(which)}
                      style={{ background: on ? T.blue : T.surface2, color: on ? "#fff" : T.ink, border: `1px solid ${on ? T.blue : T.line}` }}>
                      {lbl} {ts ? `${fmtDate(toDateStr(ts))} ${fmtClock(ts)}` : "—"}
                    </button>
                  );
                })}
              </Row>
              <Row style={{ gap: 8, flexWrap: "wrap" }}>
                <input type="date" value={timeEdit.date} onChange={(e) => setTimeEdit({ ...timeEdit, date: e.target.value })}
                  className="ll-input" style={{ width: 150, padding: "6px 8px" }} />
                <input type="time" value={timeEdit.time} onChange={(e) => setTimeEdit({ ...timeEdit, time: e.target.value })}
                  className="ll-input" style={{ width: 130, padding: "6px 8px" }} />
                <button className="ll-btn ll-btn-chalk ll-btn-sm" onClick={saveTime}>Save</button>
                <button className="ll-btn ll-btn-sm" onClick={() => setTimeEdit(null)}>Cancel</button>
              </Row>
              <div style={{ color: T.faint, fontSize: 11.5, marginTop: 8 }}>Duration recalculates automatically from these dates and times.</div>
            </div>
          )}
        </div>
        {data.exercises.filter((ex) => sess.entries[ex.id]).map((ex) => {
          const e = sess.entries[ex.id];
          if (!entryHasData(e)) return null;
          const vName = (ex.variants.find((v) => v.id === e.variantId) || {}).name || "";
          const evol = scoreOf(e.sets);
          const prevSame = lastEntryFor(data, ex.id, e.variantId, openDayKey, sess.date);
          const exDelta = prevSame ? pct(scoreOf(prevSame.entry.sets), evol) : null;
          const won = exDelta !== null && exDelta > 0;
          const exStrip = won ? T.pos : exDelta !== null && exDelta < 0 ? T.neg : T.amber;
          return (
            <div key={ex.id} className="ll-card" style={{ padding: "11px 13px" }}>
              <Row style={{ gap: 9, alignItems: "stretch" }}>
                <span style={{ width: 4, borderRadius: 2, background: exStrip, flex: "none", boxShadow: won ? "0 0 8px rgba(105,181,109,0.7)" : "none" }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <Row style={{ justifyContent: "space-between", marginBottom: 4 }}>
                    <span className="ll-display" style={{ fontSize: 16, fontWeight: 600 }}>
                      {ex.icon ? <span style={{ marginRight: 6 }}>{ex.icon}</span> : null}
                      {e.swapName || ex.name}
                      {e.swapName ? <span style={{ color: T.amber, fontSize: 11.5, marginLeft: 6, fontFamily: "Barlow" }}>swapped</span> : null}
                    </span>
                    <Row style={{ gap: 8, flex: "none" }}>
                      <Delta value={exDelta} />
                      <span className="ll-num" style={{ color: T.muted, fontSize: 12.5 }}>
                        {isBodyweight(e.sets) ? `${repsOf(e.sets)} reps` : fmtVol(evol)}
                      </span>
                    </Row>
                  </Row>
                  {vName && vName !== "Usual machine" && (
                    <div style={{ color: T.muted, fontSize: 12, marginBottom: 3 }}>{vName}</div>
                  )}
                  <div className="ll-num" style={{ fontSize: 14.5 }}>{setsLine(e.sets)}</div>
                  {e.note ? <div className="ll-note" style={{ marginTop: 8 }}>“{e.note}”</div> : null}
                </div>
              </Row>
            </div>
          );
        })}
      </div>
    );
  }
  const exList = data.exercises.filter((e) => e.day === day);

  if (openEx) {
    const ex = data.exercises.find((e) => e.id === openEx);
    const hist = historyFor(data, ex.id);
    const maxVol = Math.max(1, ...hist.map((h) => scoreOf(h.entry.sets)));
    const rows = hist.map((h, i) => {
      const vol = scoreOf(h.entry.sets);
      /* find previous session with the SAME machine for a fair delta */
      let prevSame = null;
      for (let j = i - 1; j >= 0; j--) {
        if (hist[j].entry.variantId === h.entry.variantId) { prevSame = hist[j]; break; }
      }
      const machineChanged = i > 0 && hist[i - 1].entry.variantId !== h.entry.variantId;
      return { ...h, vol, delta: prevSame ? pct(scoreOf(prevSame.entry.sets), vol) : null, machineChanged };
    }).reverse();

    return (
      <div className="ll-fade">
        <button className="ll-btn ll-btn-sm" style={{ marginBottom: 12 }} onClick={() => setOpenEx(null)}>← Back</button>
        <div className="ll-display" style={{ fontSize: 24, fontWeight: 700, marginBottom: 2 }}>{ex.name}</div>
        <div style={{ color: T.muted, fontSize: 13, marginBottom: 14 }}>
          {day} · volume = weight × reps, all sets · compared only against the same machine
        </div>
        {rows.map((r) => {
          const vi = ex.variants.findIndex((v) => v.id === r.entry.variantId);
          const vName = (ex.variants[vi] || { name: "Usual machine" }).name;
          return (
            <div key={r.key} className="ll-card" style={{ padding: "11px 13px" }}>
              <Row style={{ justifyContent: "space-between", marginBottom: 6 }}>
                <Row style={{ gap: 7 }}>
                  <span className="ll-num" style={{ fontSize: 13.5, fontWeight: 700 }}>{fmtDate(r.date)}</span>
                  {ex.variants.length > 1 && (
                    <Row style={{ gap: 5 }}>
                      <VariantDot index={Math.max(0, vi)} />
                      <span style={{ color: T.muted, fontSize: 12 }}>{vName}</span>
                    </Row>
                  )}
                  {r.entry.swapName && <span style={{ color: T.amber, fontSize: 12 }}>did {r.entry.swapName}</span>}
                </Row>
                {r.machineChanged && r.delta === null
                  ? <span style={{ color: T.faint, fontSize: 12 }}>machine changed</span>
                  : <Delta value={r.delta} />}
              </Row>
              <PlateBar frac={r.vol / maxVol} color={T.amber} />
              <Row style={{ justifyContent: "space-between", marginTop: 7 }}>
                <span className="ll-num" style={{ color: T.muted, fontSize: 13 }}>{setsLine(r.entry.sets)}</span>
                <span className="ll-num" style={{ fontSize: 13, color: T.ink }}>{isBodyweight(r.entry.sets) ? `${repsOf(r.entry.sets)} reps` : fmtVol(r.vol)}</span>
              </Row>
              {r.entry.note ? <div className="ll-note" style={{ marginTop: 8 }}>“{r.entry.note}”</div> : null}
            </div>
          );
        })}
        {rows.length === 0 && <div style={{ color: T.muted, textAlign: "center", padding: 30 }}>Nothing logged yet.</div>}
      </div>
    );
  }

  return (
    <div>
      <Row style={{ gap: 4, flexWrap: "wrap", padding: "6px 2px 12px" }}>
        {DAYS.map((d) => {
          const st = dayWeekStatus(data, d);
          return (
            <button key={d} className={`ll-chip ll-day ${d === day ? "on" : ""} ${st === "star" ? "starred" : ""} ${OPTIONAL_DAYS[d] ? "optional" : ""}`}
              style={st === "star" ? { borderColor: `${rw.color}8C`, background: `${rw.color}12`, boxShadow: `0 0 9px ${rw.color}59` } : {}}
              onClick={() => setDay(d)}>
              <DayStatusIcon status={st} size={7} data={data} />
              {DAYS.length > 4 ? d.slice(0, 1) : d.slice(0, 3)}
            </button>
          );
        })}
      </Row>
      <div className="ll-display" style={{ fontSize: 26, fontWeight: 700, marginBottom: 2 }}>Progress</div>
      <div style={{ color: T.muted, fontSize: 13, marginBottom: 12 }}>{data.cycleName || `Cycle ${data.cycleNumber}`}</div>
      <StatStrip data={data} />
      <CycleGrid data={data} onOpenDay={setOpenDayKey} onGoToday={onGoToday} />
      <TrendCard data={data} update={update} day={day} />
      {exList.map((ex) => {
        const hist = historyFor(data, ex.id);
        const last = hist[hist.length - 1];
        let delta = null;
        if (last) {
          for (let j = hist.length - 2; j >= 0; j--) {
            if (hist[j].entry.variantId === last.entry.variantId) {
              delta = pct(scoreOf(hist[j].entry.sets), scoreOf(last.entry.sets));
              break;
            }
          }
        }
        const mini = hist.slice(-6);
        const maxV = Math.max(1, ...mini.map((h) => scoreOf(h.entry.sets)));
        return (
          <div key={ex.id} className="ll-card" style={{ padding: "12px 14px", cursor: "pointer" }} onClick={() => setOpenEx(ex.id)}>
            <Row style={{ justifyContent: "space-between" }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div className="ll-display" style={{ fontSize: 17, fontWeight: 600 }}>{ex.icon ? ex.icon + " " : ""}{ex.name}</div>
                <Row style={{ gap: 3, marginTop: 8, alignItems: "flex-end", height: 26 }}>
                  {mini.map((h, i) => {
                    const same = last && h.entry.variantId === last.entry.variantId;
                    return (
                      <div key={i} style={{
                        width: 14,
                        height: Math.max(3, (scoreOf(h.entry.sets) / maxV) * 26),
                        background: same ? T.amber : T.line,
                        borderRadius: 2,
                      }} />
                    );
                  })}
                  {mini.length === 0 && <span style={{ color: T.faint, fontSize: 12 }}>no data</span>}
                </Row>
              </div>
              <div style={{ textAlign: "right", flex: "none" }}>
                <Delta value={delta} />
                <div style={{ color: T.faint, fontSize: 11.5, marginTop: 3 }}>vs last time</div>
              </div>
            </Row>
          </div>
        );
      })}
    </div>
  );
}
